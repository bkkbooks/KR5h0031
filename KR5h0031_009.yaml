front:
  text: 皇明恩命世録卷之九書二
  hash: sha256:868d84e39deb6a7ea5abbf98efa4eaf9b6dc9f7caad37e165f28ae92a5eb7cd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_009-001a, image: hfl/1065/1065-166.png}
body:
  text: 四十九代大真人張永緒嘉靖二十八年詔隨父入朝及抵都門上遣太監高忠傳諭慰勞齎賜莽衣玉帶俾服之明日召見于內庭錫宴便殿準嗣教襲爵暫免入朝敕皇帝敕諭正一嗣教大真人張永緒嘉靖二十九年例該朝覲之期朕念爾年幼專差千户王勳齎勑傳諭暫免來朝爾宜體朕至意如諭奉行故諭敕命嘉靖二十八年七月二十四日之寶授大真人誥奉天承運皇帝制曰聖化顯禆夙藉玄元之教治功默相式資清靜之風惟嗣人能紹乎真傳肆朝廷宜申乎錫命爾張永緒之先炎漢之世揚闡玄機歷代相承尊仰師範逮我皇祖御極念其祝釐有衛國之功因錫以世傳真人之命惟爾稟資英發賦性通眀克振宗風嗣承祖蔭兹特封正一嗣教守玄養素遵範崇道大真人掌天下道教事錫之誥命爾宜愈加持守益慎焚修務期熙治運于昌亨奠民生于康泰式昭玄祐永保皇圖欽哉制誥嘉靖二十九年四月十六日之寶本年詔聘定國公徐延德女為配命成國公朱希忠遂安伯陳鏸議行婚禮三十一年召見錫宴內庭賜伯爵服旨該司禮監黃錦傳奉聖旨正一嗣教大真人張永緒著給與伯爵朝祭常服仍賜常用欽此該禮部欽遵題覆移咨工部製造紅羅公服一領玉革帶全紅羅朝服一副帶事全青羅祭服一領大紅紵絲衣一領青紵絲一領金冠一頂玉帶一圍牙笏一執咨送領用三十二年正月恩命成婚月餘差官伴送回府賜應付旨聖旨正一張真人雖有舊例往回應付今次有旨差官伴送回府緣何一切都欺視減大半著照舊例增與四分之一不許遲違該部知道本年上發內帑銀若干錠特遣錦衣衛千户趙虎齎敕建正一靜應祥符三觀三十七年欽降香山神像一座命成祀于萬法宗壇準加授道士金元清道録司左正一銓補齊雲山玄天太素宫提點準授法師張拱極丘育才任大上清宫提點提舉三十八年正月十三日命早還家諭該中官趙憲傳奉聖諭過了二十日早回家去他父親在家盻望著他欽此申敇所司照舊優免給與新例勘合旨聖旨這所奏雜差料價著巡撫官查明優免應付勘合兵部查照新例給與船隻照舊例起撥還寫護敕與他有司不許欺視欽此諭有司官員人等不許欺漫敕皇帝敕諭有司官員人等朕惟玄元之教其來尚矣正一嗣教大真人張永緒蓋自先世弘演道教為國祝釐濟利生民陰翊皇度閲歲滋久玄績益彰用是加以崇秩待以殊禮所以示優眷之意是真人入覲回特兹降敕曉諭除雜差料價等項查明如舊優免應付勘合該部便查照新例給與船隻著照舊例起撥外其有司官人等俱要遵奉敕旨不許故欺慢視如有抗違恣行欺慢者必治以重罪不宥故諭敕命嘉靖三十八年正月二十九日之寶四十三年上御西苑召見命祈雪于朝天宫又命醮于內殿明年正月元旦詔先諸大臣入見便殿與大學士徐階等七臣同賜宴殿中四十四年封徐氏元君誥奉天承運皇帝制曰國家于士大夫之配咸有恩命以寵榮其身至于顯紹真宗默襄玄教則其賢尤足稱焉爾故大真人張永緒妻徐氏出自元勳之門相我高真之胤夙諳圖史能律己於端莊繼習經詮恆處心于平等實生嗣子用續箕裘兹特賜封曰靜和元君錫之誥命夫間家之道莫先於靜睦族之方莫美於和爾既婦道之有聞尚期母道之無忝式延世澤以答國恩制誥嘉靖四十四年九月初九日之寶禁約族屬人篤侵害敕皇帝敕諭靜和元君徐氏朝廷崇重太上教旨既闡揚其正化以祈祐於邦家則必保護其後人以冀衍于派裔兹大真人身故子幼朕甚憫焉特賜封爾徐氏為靜和元君管理內事仍選清謹道士四名為贊教掌書佐理外事爾於幼子務須加意愛養及時訓教俾無參厥世以克承國恩一應族屬人等但有倚恃行高人衆凌侮侵害者輕則聽爾差人呈告撫按司府等官戒治發落重則聽爾指實奏聞以憑拿問其贊教掌書若有所為不法亦聽爾如前禁治爾欲正人先須正己欲族之不侵侮亦先須有以睦族爾其欽哉故諭敕命嘉靖四十四年九月十五日之寶敕賜祭葬恤典旨聖旨所奏并一應保恤事宜禮部便查例來看欽此諭祭七壇文維嘉靖四十四年月日皇帝遣行人司行人姚光諭祭大真人張永緒曰卿嗣領道教為國祝釐未及壯年遽爾沒爰加恩恤仍撫爾孤諭祭特頒併營兆域靈如不昧涣命祗承諭祭首七文曰卿嗣教祝釐遽爾早世兹當首七諭祭再頒爾如有知歆承無斁諭祭百日葬期周期再期禫除文曰卿之云沒倏爾許時爰以某期載用遣祭惟靈不泯服此渥恩奉皇帝制曰道統于宗教隆元始人本乎祖典重追崇爾張彥翼乃正一嗣教凝誠志道闡玄弘教大真人國祥之祖父出自玄門逰于方外含真靈府啓乃聞孫丕闡宗風默襄化理茲以爾孫之請特贈爾為正一嗣教秉誠崇範真人歆茂渥于皇綸播休光于仙籙制曰道教之原始于玄牝孫謀之裕啓自重闈爾楊氏乃正一嗣教凝誠志道闡玄弘教大真人張國祥之祖母育秀名閨作嬪仙裔發祥再世丕紹真宗兹特贈爾為安淑玄君祗服恩綸永昌靈緒制誥萬曆三十年三月十四日之寶奉天承運皇帝制曰朕惟道莫先於忠孝恩莫大于追崇此重本著典也爾張永紹乃正一嗣教凝誠志道闡玄弘教大真人掌天下道掌事國祥之父技連仙裔蛻蚤塵囂今因爾子推恩贈爾為正一嗣教崇謙養素真人錫之誥命昭兹異數賁爾冥靈制曰至道之宗有名為母若弗獲偕榮于前而得延澤於後則尤宜旌節而廣孝焉爾夏氏乃追贈正一嗣教崇謙養素真人張永紹之配封正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥之母守志茹蘖訓子承玄兹特錫之誥封為靜恪玄君爾其益茂修姱永昌祚胤欽哉制誥萬曆二十三年五月初一日之寶奉天承運皇帝制曰朕惟皇王御宇凡祝釐陳祕錫福導民所以陰翊化理者率道教是崇爾張國祥襲蔭有年禱祈多驗心每懷乎沖退例宜示夫寵嘉兹特封正一嗣教凝誠志道闡玄弘教大真人掌天下道教事錫之誥命爾其懋培悃愫堅勵修持播真風以成家彰玄化于奕世庶禆祚運無負優崇欽哉制曰翊教軌于人倫偕榮比於恆典若乃儲徽華胄媲美玄門則其賢尤足嘉焉正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥妻謝氏乃前宗人府事太子太保駙馬都尉詔之女系出帝乙之妹初賔仙室之支能脫穠華自甘淡泊事姑以孝修饋惟清今持錫之誥封為靜淑玄君爾尚效代終於靜專作好逑於貞淑式增道範永副綸褒欽哉制誥萬曆三十三年五月初一日之寶
