front:
  text: 皇明恩命世録卷之八
  hash: sha256:5ec9b709fc056c60b0ff7ac72afa4dfc2db8280efe701528aa39ea27011b35b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_008-001a, image: hfl/1065/1065-130.png}
body:
  text: 四十八代大真人張彦頨弘治十四年詔隨父入朝上御欽安殿召見命坐賜宴及玉帶綵衣之屬錫誥授正一嗣教致虛冲靜承先弘化大真人掌天下道教事正德三年命給度牒五百度羽士修建大上清宫勅勅内官監太監李文龍虎山清宫毁壞先帝常有㫖修盖後因地方多事未曾舉行近該正一嗣教真人張彦頨奏乞盖造今特命爾前去彼處會同江西鎮巡等官督同都布按三司委官人等提督修盖其合用物料人力相工派辦務要照依舊式使規模停當財物堅固毋得遲延歲月虛費錢糧且江西地方人民艱窘盜賊未寧爾尤宜持廉秉公安靜行事戒飭下人不許因而侵尅科害致生嗟怨斯爲爾能如違責有所歸爾其慎之愼之故勅廣運正德三年六月十二日之寳七年命陪祀泰壇十五年上南狩或言牛首山後湖各有妖召見于行在所命徃除之扈駕還京嘉靖元年召問對以清心寡欲稱㫖特准還山請太上延禧諸階法籙以進三年詔聘安遠侯柳文之女爲繼室命留都内外守備官陪徃親迎五年加封大真人誥奉天承運皇帝制曰朕紹膺休命祗率舊章惟治化之誕敷亦玄宗之不廢爾正一嗣教致虛冲靜承先弘化大真人張彦頨裔出炎漢道本周聃符籙得於真傳鍊養契乎樞要念蔭承之旣乆奔走惟勤嘉感格之通靈禱禳多驗兹特封爲懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事錫之誥命爾尚清虛之教以益振乎玄風弘利濟之心以增光于王化永保景福敷錫群倫欽哉制誥嘉靖五年二月初三日之寳加封敕勅正一嗣教大眞人張彦頨今特加封爾爲懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事給與誥命以爲爾榮其上清宫道士傳德岩邵啓南著做大眞人府賛教余永壽詹望奎著做掌書各令到任管事爾宜仰遵朕命恪守清規以祈福佑於悠久仍鈐束各官令其公勤趨事不致怠忽廢馳庶副崇重之意欽哉故諭廣運嘉靖五年二月十五日之寳命祈禱于太和山勅特諭正一嗣教大真人張彦頨今朕命爾前詣玄天福地修建清醮一以爲國大本一以爲民祈福爾務精一乃心恭虔致恪尤須鈐束下人及差去盖府官員爾亦斟酌調理被所占地址就量復原舊惟在謹慎用心勿怠乃事庶副朕至意亦扵教門有光欽哉廣運嘉靖五年二月十六日之寳重建大真人府第勅勅内官監左少監吴猷近因正一嗣教大真人張彦頨奏稱光年府第已壞乞要差官起造今特命爾前去彼處依式樣督工上緊盖造合用錢粮令彼䖏巡撫巡按三司等官措置應用人夫於鄰近州縣派撥到彼做工爾須計算工料如法整理務要堅實尤宜秉公持廉安靜撫卹匠作軍夫人等俾各食息以時勞逸適均而皆樂於趨事斯爲爾能毋得因而科擾致人嗟怨如違責有所歸爾其如勅奉行故勅廣運嘉靖五年三月日之寳本年五月欽須神像井賜印記諭司禮監太監鮑忠傳奉聖諭以所奉三清四帝列曜神像著吴猷齎去龍虎山大真人府萬法宗壇安祀併賜銀鏤掌法仙卿之印一顆牙刻宗傳之印一顆欽此詔户部查復上清宫田糧侵匿于豪民者降勅禁護本年元陽帝君親筆書復師真幕前兹自二月師回建醮于武當山一向未聞信回今八月十八日得致一真人轉到師書一封知其遠涉暑天勞辛路次予復觀之又知師以犯人陳某欲予宥他伹罪甚矣予已知之師可攝養時序以迎和氣惟大闡玄妙之功弘彰利國之奥誠以格天佑予皇圖永綿萬世也予亦奉天以敬體道以德勉作政教耳又倘武當山宫觀䖏或至理丹册法書神物勞師訪與遂予慕道之誠心也今因使還持此以復惟師知之嘉靖五年中秋復四日六年元陽帝君書奉兹者去歲命師躬詣萬法祖師福地安神修醮并靜樂宫建祈嗣齋深勞真體予正思間而左至靈吴尚禮七月終至京得聞師建醮事畢回幕繼而舍人張顯等於九月方到京承以福地珍産靈物等項予謹收已今因使回特令持以意誠徃答又蓋造法壇府第有司慢毁不遵予命欺侮法度今已令上緊盖造即日回話惟師暫屈仙仗以待工完日回居舊府惟師知詧嘉靖六年九月吉日七年命陪祀星辰壇十一年重修大上清宫勅勅内官監左監丞曹玉江西龍虎山上清宫殿宇年乆損壞即上緊修理完備其勑建仙源宫照依降去圖樣如式盖造務各基址堅固棟宇壯實以圖永乆用稱朕事神之至今特命爾前去會同彼䖏撫按官督同該司府等官查照先年事例一併修造合用物料夫匠錢粮悉照該部題准事理處置應用務要綜理周宻區畫得宜爾爲内臣受兹委任尤須待廉秉公安靜行事撫卹匠役人等俾食息以時勞逸適均樂於趨事斯爾之能毋得因而縱容科擾役占刁蹬需索致生嗟怨自取罪愆事完將修盖過殿宇支用過錢粮數目造册奏繳爾其慎之故勅廣運嘉靖十一年三月初七日之寳十四年准照舊蠲免通戶差徭㫖該户部欽奉聖㫖正一大真人不是今日的我皇祖已有恩㫖所奏都准他有司不許欺慢你每但知賣公爾且不查究特命悉蠲之十六年提問沿途違漫官吏㫖聖㫖張彦頨總領道教赴京朝賀先朝屢有明㫖著沿途有司應付各該地方官吏如何不行支給著巡按御史查提了問巡撫官且不查究今後務要嚴加戒飭軍衛有司一體應付不許遲違悮事該衙門知道本年命祈雪于内庭賜金冠玉帶法器銀弊之屬十七年正月命建金籙大齋于内皇壇賞賚有加命沿途衙門照例應付勅勅正一嗣教懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事張彦頨得爾奏稱每三載依例朝覲沿途經過有司衙門不肯照例應付以致道路多阻赴朝失期先年奏有明㫖又復違背等因兹降勅㫖以護爾凡爾朝賀等項來京徃迴經過處所軍衛有司驛遞等衙門即便照例一體應付不許留難敢有仍前怠慢悮事聽爾指實奏聞䖏治其欽承之故勅廣運嘉靖十七年二月初四日之寳本年命徃齊雲巖修醮敕勅正一大真人張彦頨徃歲嘗命真人李得晟恭詣齊雲巖北極真武神祀建醮禱嗣果獲靈應今特命卿詣彼虔修齋醮一以謝神一以上祈母壽事畢卿還山着隨去高士聶一然回奏卿經過去䖏軍衛有司驛逓等衙門即便照例應付不許欺慢留難如有不遵勅㫖故違悮事者聽卿奏聞處治故勅廣運嘉靖十七年二月十九日之寳十八年准奏齊雲山如太和山例除官道住持管理賜神宫名曰玄天太素宫仍免本山香錢解京降勅禁護聖母升遐示哀手書象一帝君書奉正一嗣教張真人幕下予真積深愆不自罹上喪慈親於戊戌之十二月四日徒裂五内之已矣復於南華親視陵園人處是時可不重傷耶况母壽未臻于中淹患連歲以朝繼夕以夕繼朝指望安復何期二聖同棄我哀哉聊書予苦衷以告哀餘不備師其亮我云元陽嘉靖十八載孟秋吉日象一拜寳記賀生子書象一帝君書奉正一師昨月得聞天垂眷于宗領道嗣開源予喜不已須旦夕保視兹使囬順令持物爲賀至可收納不備元陽涵極己亥歲季冬吉日象一書奉象一帝君寳十九年暫免入朝勅皇帝勅諭正一嗣教大真人張彦頨朕惟我皇祖之制天下大小衛門官員凡三歲一朝覲卿亦在與焉重爾教也今年又當其期朕念卿中年方得一子矧在襁褓或難遠離特遣行人黄如桂徃諭今次特暫免卿來俾卿得專守視見朕保慎爾嗣之意卿其欽承之哉故諭勅命嘉靖十九年五月初五日之寳二十一年贈朱氏宋氏玄君誥奉天承運皇帝制曰母之於子旣均教育之勞君之扵臣必體顯揚之願事有關扵風化恩豈限扵常科爾朱氏乃已故太師兼太子太傅成國公儀之女今正一嗣教大真人掌天下道教事張彦頨之嫡母勳門毓秀宦族揚芬行儉且勤性柔而正相夫契清㣲之妙教子敦玄素之誠邦國藉以祝釐羽風因之丕闡爰推懿訓用錫綸章兹特贈爲端柔順德玄君錫之誥命賁光寵於九原衍休聲於百世制曰子以母賢信慶源之有自母因子貴宜恩典之是加顧兹玄教之臣可恡褒嘉之命爾宋氏乃錦衣衛指揮使清之女今正一嗣教大眞人掌天下道教事張彦頨之生母簪纓茂族閥名家賦性温柔克著儉勤之德持身端謹式資清靜之風揆厥所由宜申褒錫兹特贈爲柔慈崇善玄君錫之誥命服此隆恩永光泉壤制誥嘉靖二十一年三月初九日之寳贈李氏吳氏柳氏爲玄君誥奉天承運皇帝制曰褒崇之錫以報賢勞恩命之須實旌賢淑此朝廷之著典也正一嗣教大真人掌天下道教事張彦頨妻李氏乃襄城伯鄌之女系出勳門早歸玄族克修婦道懋著賢聲爰推寵異之章實體爾夫之請兹特贈爲冲虛柔惠玄君錫之誥命敬服殊恩光爾幽室制曰臣有事君之誠褒榮宜厚婦有從夫之義寵命惟均風化所關存亡奚間正一嗣教大真人掌天下道教事張顔頨繼妻吴氏乃錦衣衛指揮珍之女蚤承姆訓作配名門淑愼有儀柔嘉維則陰翊玄教俾益良多兹特贈爲安妙善常玄君錫之誥命冥漠有知承此優眷制曰朝廷推恩臣下必褒榮其妻所以厚人倫之本勵相成之道也正一嗣教大真人掌天下道教事張彦頨繼妻柳氏乃安遠侯文之女出自勳門于歸宦族性資淑慎容止柔嘉默相玄風式彰令聞兹特贈爲莊惠志道玄君錫之誥命靈爽如存歆承渥命制誥嘉靖二十一年三月初九日之寳本年命給部牒五百度羽士勅江西巡撫禁約撫州民私造僞籙二十二年再免入朝勅皇帝勅諭正一嗣教大眞人張彦頨朕惟我皇祖之制天下大小衙門官員凡三歲一朝覲卿亦在與焉盖以卿教宗之後故重之也前歲朕念卿子幼免來今年又當其期卿子尚難遠離特遣錦衣衛百户喬鑑齎勑徃諭再暫免卿來朝俾得專守視見朕保慎爾嗣之意卿其欽承之哉故諭勅命嘉靖二十二年五月十五日之寳二十八年詔携嗣子入朝比至都門上遣太監高忠傳諭慰勞齎賜嗣子衣帶明日召見錫宴便殿命録歷代眞人名諱進覽上親灑宸翰賜曰卿子名可曰永緒准奏致仕紹永緒嗣教襲爵三十九年特賜侯爵例祭塟卿典諭聖諭朕正思於二月差官免正一大真人來朝俾其侍親弗期昨仲冬伊父故矣著照侯爵例給與葬資齋粮麻布一百石疋祭十三壇便行文所司遵行仍差千户一員行人一員去諭免嗣眞人來朝并督視掌行喪禮該部知道詔遣行人司行人李琦諭祭同錦衣衛千户王正億督視掌行喪禮旗校二十名偵察違慢員役勅下該部如儀以弋陽縣城東叠山書院遷改爲塟地復詔遣錦衣衛千户温堯民督催原差官役作速如侯爵例禮數造完塟諭祭十三壇文嘉靖四十年月日皇帝遣行人司行人李諭祭正一嗣教大真人張彦頨卿受國恩嗣領道教存神淵默養性冲虛祝釐爲民宣勞著續以時入覲簡在朕心式重高風屢須寵渥宜延遐祉以疾告終訃音來聞良用悼惜特加卹典賜祭遣官仍令有司爲營兆域卿靈不昧涣命祗承諭祭首七并七七文曰卿凝玄守靜綽有祖風闡教匡時厥功乆茂胡爲奄逝某七倏臨遣祭有儀歆承無斁諭祭百日窀穸週基再期禪除文曰卿神逰仙境跡化玄都緬憶真風涣施卹典日月云邁某期倏臨諭祭載須尚其歆服
