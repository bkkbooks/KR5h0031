body:
  text: 吳王令旨江西等處行中書省盖聞玄教無爲默贊國家之治皇猷大啟丕崇道德之風乃眷至人素居福地旣已歸於版籍必特表其儀形信州龍虎山正一教主天師大真人衍華胄於留侯紹真傳於老子身受祖師之託役彼百靈心與造物者遊超乎萬類凡有知覺罔不皈依但因兵革以來遂使公庭多故近聞冠珮遠寄江湖爰伸物色之勤庶冀旋居之速省府除已差官齎香前詣龍虎山宗壇敬奉真仙祝延聖夀外合行出榜曉諭仰總兵官及有司官員訪求天師多有招聘禮請入山依前住持道教但係龍虎山宫觀殿宇及供器什物諸人毋得作踐損壞褻凟神明舊管山園田地房屋悉聽爲主諸色軍民人等不許奪占違者治罪湏至榜者龍鳳六年月日給本年四月回勉澄心定性以凝道功書吳王書致玄壇教主四十二代天師張真人五月六日俞真人來捧至箋文并有竒香素羅之獻誠意甚厚足見名山文物之盛吾聞漢祖天師道德在躬動得鬼神之助一嘘一吸間天道爲之晦冥雷霆諸神莫不受命以此輔國濟民除其妖孽援其水旱故靈名厯四十餘代而愈著也今吾師旣臨乃祖之位序當繼乃祖之成烈有非他術之可同者願師澄心定性以凝道功使前靈之跡益顯則龍虎之山益崇而人益仰望也夏月道體平安否尙冀千萬加愛乙巳年上召見命坐賜宴賜褒天師旨吳王令旨夫天地之間品類不等生而無窮惟人最靈然而神聖之生賢人所降非常也皆得天地至靈之氣故然亦世間聖賢之常也有天假其能因天授之人歟或爲帝王或爲將相如釋道焉或爲佛或爲仙雖或天地正氣所生是由天假其能故成數等予聞漢祖天師生而異常眉崢鬚橫兩目星馳電轉神威萬倍始西蜀詣龍虎役使鬼神肇造玄壇非獨自己爲能止了身心實與國民有補焉至是捍大患禦大灾明孚三界鬼神相繼留傳厯代代代無有不崇者何也蓋由天師靈而有益者是也予自草萊因天下變爲衆所尊不敢不竭心之誠以安民庶每聞天師今爲我見快哉一覩覿面天師瞳樞電轉法貌昂然雖不職事於朝廷同我一時豈不千載一遇也可不竒哉然而釋道之玄深有意焉愚者未知知者勿迷敬常則吉非常則禍福增滅矣悅天師法貌其容同祖故有賜上再召入對仍賜宴及金幣還山丙午年命普施符水旨吳王令旨予聞漢天師妙用玄機通天透地濟物利人爲國家捍患禦灾厯代聖賢所禱無不感應今天師息於朝天宫士民濟濟求符師當斟酌放符驗其有無患難與可與之人而無患難之家與訖一符他日患難暴生愚民無所知將謂符法所驗或有相輕互相轉說爲師之慮莫若從有患者給無患者郤此說未知當否宜與諸法師會議普施符水深潛妙用以秀山靈可也上聞病疫者飲井中符水獲差聖意嘉之命作亭于井上號曰太乙泉命進太上延禧籙准辭還山特詔中書給驛劵畀之以便朝覲吳元年丁未二月初八日命選精道法師赴闕書吳王書致玄壇教主龍虎山張天師予近自正月爲國家之事心所欠者欲奏聞上帝柰無人捧詞至于天庭故差人詣天師門下望天師以彼祖宗之靈必當誠心差精通道妙之師捧詞達天以申祈禱之情卽師之䖍意也書至幸望令能者之師前來再不多叙本年五月洪武元年上登大寳位錫宴于便殿上顧諭曰兹授卿以大真人稱號誥命將議給食祿旣而面可辭俸之奏俾專出符籙如故事恩免通戸及大上清宫各色徭役永爲定例命給銀印視正二品設賛教掌書佐理等官授四十二代天師大真人誥奉天承運皇帝制曰朕惟玄教真風闡五千餘言之典祖庭積慶衍四十二代之傳地靈毓龍虎之英仙骨竦鶴鸞之表掌兹正一品佑我大明天師張正常簡素性成端疑天賦琳書寳札探秘妙於珠黍之中絲輿瓊輪超冥漠於璇霄之上仗劍則鬼神聽令登壇則雷雨應時卓爾天人之師允矣神明之胄然道德不拘於名爵性情貴守於中和夫何近代以來特授官資之顯揆以至理未足爲榮用制真人之美稱俾冠道流於當世聲揚寰宇法主宗壇予欲通誠於九天汝則以精神而運用予欲敷治於四海汝則以清静而輔毗茂膺寵光永綏福履可授正一教主嗣漢四十二代天師䕶國闡祖通誠崇道弘德大真人領道教事宜令張正常准此制誥洪武元年三月初一日之寳准辭還山上御謹身殿從容謂曰卿祖天師有功於國所以家世與孔子並傳以迄于今卿宜體之以清靜無爲輔予至治則予汝嘉諭畢出白金十五鎰賜之俾葺府第二年二月特召入朝上御奉天殿賜見預命設晏待之是月垂顧問者四二月十三日上將通誠於天帝致齋三日御衮冕親署御名于重勅太常設樂手授俾祝而焚之禮成賜金幣宴于文樓羣弟子饗於别館賞賚有差三年六月上錄功貤寵特勅吏部改贈正常父三十九代天師太玄輔化體仁應道大真人嗣成爲正一教主大玄弘化明誠崇道大真人改封正常母明慧慈順仙姑胡氏爲恭順慈惠淑靜玄君上一日召見問以鬼神情狀命更給掌天下道教銀印五年加授永掌道教事誥奉天承運皇帝制曰朕惟道家者流本於清静無爲其來尙矣龍虎山張氏自漢以下宗派相繼其四十二代孫正常存心冲澹葆德純和遠紹宗傳以守正一朕用嘉之是宜錫以真人之號爾其益振玄風永掌其教焉可授正一嗣教䕶國闡祖通誠崇道弘德大真人掌天下道教事宜令張正常准此制誥洪武五年十二月日之寳九年上遣使召忽先期入見上喜曰卿來何與朕意相符明年秋朕將遣使祠海嶽諸神卿當妙柬清修之士與其偕來賜宴及金紋法衣玉圭珮法器之屬十年命率弟子至京上召見錫宴午門之城樓上舉爵謂曰卿宜罄此一觴勅內侍官出御製厯代天師賛示曰他日當書以賜卿明日詔偕太師韓國公李善長代祠嵩山分遣大臣與弟子代祠羣望仍賜衣二襲及楮幣有差旣還復命錫宴賞如初遣祠嵩山勅勅正一嗣教大真人張正常朕聞天生民而立君君爲民而立命所以謹百神之祀乃國之先務也朕與卿等當羣雄角逐之時戰勝功取非上天后土之眷命嶽鎮海瀆之效靈安能如是今者新秋在邇嶽鎮海瀆之祀禮當報謝古者君狩方隅詣祠而祭朕爲新造邦基民生方始未獲親往特命卿等代朕以行奉犧牲祝帛於神所故兹勅諭汝往欽哉勅命洪武十年六月日之寳十一年上聞禮部尙書張籌代奏訃音天衷嗟悼良久且曰朕欲命其徧祠五嶽今方一至嵩山何期大數止於此遂親製祭文一通詔遣前浙江行省叅知政事安慶詣山諭祭維洪武十一年𡻕在戊午正月甲戌朔越二十日癸已皇帝遣浙江叅政安慶致祭于大真人張正常之靈曰繼出世法統仙度人禦灾捍患機斡萬靈飛符仗劍轉斗移星雷神聽令妖鬽潜行道光斯著貌正精英何乘鸞之去急控法印於上清今遣人祀以牲醴爾其有知尙饗
