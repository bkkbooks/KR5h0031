body:
  text: 洪武三十二年初父張宇珵䝉太祖高皇帝聞其賢與無爲真人宇初同被召對稱旨特命御史中丞䕶軍誠意伯劉基以其弟之女妻之宣德二年召見賜宴便殿四年召問命進太上延禧籙仍命建延禧醮於大內四月命陪祀太廟授大真人誥奉天承運皇帝制曰朕惟玄元之道清靜無爲根柢羣倫神妙萬化上陰翊於治理下利澤於生靈厯代以來咸加獎勵爾張懋丞自其先世崇修至道爾祖爾伯皆克祗承今爾當嗣特命爾爲正一嗣教崇修至道葆素演法大真人領道教事爾其虔奉玄範茂振宗風導迎鴻禧翼贊皇祚欽哉制誥宣德四年四月日之寶五年命分獻東鎮壇命醮於仁智殿三月上御西宫召對詔授上清宫高道操克弘龔繼宗顔福淵黃嘉佑等道錄官仍遣中官𥠖都至山起之贈孫氏玄君誥奉天承運皇帝制曰國家崇獎道教於正一真人之嗣旣有褒封而其嗣之內助葢亦與榮焉正一嗣教崇修至道葆素演法大眞人領道教事張懋丞妻孫氏方當內助而遽殞逝今追贈爲柔惠真靜玄君靈爽不昧尙克膺承制誥宣德五年閏十二月二十日之寳六年命分獻星辰壇命醮於內皇壇四月命陪祀太廟禮畢特遣中官䕶送還山元年命醮於靈濟宫命分獻風雲雷雨壇三月命建保安醮於大德觀勅給部牒五百俾度羽士五月御製招隱歌賜之准辭還山抵甲馬營傳舍上復遣使追授密勅建進修煉之學以衍宗風正統元年勅建天師府於朝天宫內東北隅特召禮官迎入府居之命修昇真大齋於朝天宫二年元旦賜宴於奉天殿十一日命分獻風雲雷雨壇明日召見繼召符聖公同宴便殿仍各賜蠎衣朱履之屬本月命進太上延禧籙四年命分獻東鎮壇二月皇太后聖壽建祈祝醮於朝天宫五年封董氏爲玄君誥奉天承運皇帝制曰國家以道教有陰翊皇度之功原其所始用顯其子孫而復推恩於室家亦恒典也正一嗣教崇修至道葆素演法大真人領道教事張懋丞繼室董氏宜從夫貴特錫之誥封爲温靜柔順玄君爾其欽承榮命永肅乃家欽哉制誥正統五年二月日之寶本年三月命建安玄帝金像醮於大內玄天祠六年命分獻東鎮壇勅給部牒五百俾度羽士七年上御文華殿召見賜宴殿中八年命分獻星辰壇遣禮部郎中工部主事諭賜祭塟文原缺
