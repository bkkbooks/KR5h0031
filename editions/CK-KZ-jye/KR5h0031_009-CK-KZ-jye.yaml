body:
  text: 嘉靖二十八年詔隨父入朝及抵都門上遣太監高忠傳諭慰勞齎賜莾衣玉帶俾服之明日召見於內庭鍚宴便殿准嗣教襲爵暫免入朝勅皇帝勅諭正一嗣教大真人張永緒嘉靖二十九年例該朝覲之期朕念爾年幼專差千戸王勳齎勅傳諭暫免來朝爾宜體朕至意如諭奉行故諭勅命嘉靖二十八年七月二十四日之寶授大真人誥奉天承運皇帝制曰聖化顯禆夙藉玄元之教治功默相式資清靜之風惟嗣人能紹乎真傳肆朝廷宜申乎錫命爾張永緖之先炎漢之世揚闡玄機厯代相承尊仰師範逮我皇祖御極念其祝釐有衞國之功因錫以世傳真人之命惟爾禀資英發賦性通明克振宗風嗣承祖蔭兹特封正一嗣教守玄養素遵範崇道大真人掌天下道教事錫之誥命爾宜愈加持守益精焚修務期熈治運於昌亨奠民生於康泰式昭玄佑永保皇圖欽哉制誥嘉靖二十九年四月十六日之寶本年詔聘定國公徐延德女爲配命成國公朱希忠遂安伯陳鏸議行婚禮三十一年召見錫宴內庭賜伯爵服旨該司禮監黃錦傳奉聖旨正一嗣教大真人張永緒著給與伯爵朝祭常服仍賜常用欽此該禮部欽遵題覆移咨工部製造紅羅公服一領玉革帶全紅羅朝服一副帶事全青羅祭服一領大紅紵絲衣一領青紵絲一領金冠一頂玉帶一圍牙笏一執咨送領用三十二年正月恩命成婚月餘差官伴送回府賜應付旨聖旨正一張真人雖有舊例往迴應付今次有旨差官伴送回府縁何一切都欺視減大半著照舊例增與四分之一不許遲違該部知道本年上發內帑銀若千錠特遣錦衣衛千戸趙虎齎勅建正一靜應祥符三觀三十七年欽降香山神像一座命成祀於萬法宗壇准加授道士金元清道錄司左正一銓補齊雲山玄天太素宫提點准授法師張拱極丘育才任大上清宫提點提舉三十八年正月十三日命早還家諭該中官趙憲傳奉聖諭過了二十日早回家去他父親在家盻望著他欽此申飭所司照舊優免給與新例勘合旨聖旨這所奏雜差料價著巡撫官查明優免應付勘合兵部查照新例給與船隻照舊例起撥還寫護勅與他有司不許欺視欽此諭有司官員人等不許欺慢勅皇帝勅諭有司官員人等朕惟玄元之教其來尙矣正一嗣教大真人張永緖蓋自先世弘演道教爲國祝釐濟利生民陰翊皇度閱𡻕滋久玄績益彰用是加以崇秩待以殊禮所以示優眷之意是真人入覲回特兹降勅曉諭除雜差料價等項查明如舊優免應付勘合該部便查照新例給與船隻着照舊例起撥外其有司官人等俱要遵奉勅旨不許故欺慢視如有抗違恣行欺慢者必治以重罪不宥故諭勅命嘉靖三十八年正月二十九日之寶四十三年上御西苑召見命祈雪於朝天宫又命醮於內殿明年正月元旦詔先諸大臣入見便殿與大學士徐階等七臣同賜宴殿中四十四年封徐氏元君誥奉天承運皇帝制曰國家於士大夫之配咸有恩命以寵榮其身至於顯紹真宗默襄玄教則其賢尤足稱焉爾故大真人張永緒妻徐氏出自元勳之門相我高真之㣧夙諳圖史能律已於端莊繼習經詮恒處心於平等實生嗣子用續箕裘兹特賜封曰靜和元君錫之誥命夫閑家之道莫先於靜睦族之方莫美於和爾旣婦道之有聞尙期母道之無忝式延世澤以答國恩制誥嘉靖四十四年九月初九日之寳禁約族屬人篤侵害勅皇帝勅諭靜和元君徐氏朝廷崇重太上教首旣闡揚其正化以祈祐於邦家則必保護其後人以冀衍於派裔兹大真人身故子幼朕甚憫焉特賜封爾徐氏爲靜和元君管理內事仍選清謹道士四名爲贊教掌書佐理外事爾於幼子務須加意愛養及時訓教俾無忝厥世以克承國恩一應族屬人等但有倚恃行高人衆凌侮侵害者輕則聽爾差人呈告撫按司府等官戒治發落重則聽爾指實奏聞以憑拏問其贊教掌書若有所爲不法亦聽爾如前禁治爾欲正人先須正已欲族之不侵侮亦先須有以睦族爾其欽哉故諭勅命嘉靖四十四年九月十五日之寳勅賜祭葬䘏典旨聖旨所奏并一應保䘏事宜禮部便查例來看欽此諭祭七壇文維嘉靖四十四年月日皇帝遣行人司行人姚光泮諭祭大真人張永緒曰卿嗣領道教爲國祝釐未及壯年遽爾奄沒爰加恩䘏仍撫爾孤諭祭特頒倂營兆域靈如不昧渙命祇承諭祭首七文曰卿嗣教祝釐遽爾早世兹當首七諭祭再頒爾如有知歆承無斁諭祭百日葬期週期再期禫除文曰卿之云没倐爾許時爰以某期載用遣祭惟靈不泯服此渥恩奉天承運皇帝制曰道統於宗教隆元始人本乎祖典重追崇爾張彦頨乃正一嗣教凝誠志道闡玄弘教大真人國祥之祖父出自玄門逰於方外含真靈府啟乃聞孫丕闡宗風默襄化理兹以爾孫之請特贈爾爲正一嗣教秉誠崇範真人歆茂渥於皇綸播休光於仙籙制曰道教之原始於玄牝孫謀之裕啟自重闈爾楊氏乃正一嗣教凝誠志道闡玄弘教大真人張國祥之祖母毓秀名閨作嬪仙裔發祥再世丕紹真宗兹特贈爾爲安淑玄君祇服恩綸永昌靈緒制誥萬暦三十年三月十四日之寶奉天承運皇帝制曰朕惟道莫先於忠孝恩莫大於追崇此重本著典也爾張永紹乃正一嗣教凝誠志道闡玄弘教大真人掌天下道教事國祥之父枝連仙裔蛻蚤塵囂今因爾子推恩贈爾爲正一嗣教崇謙養素真人錫之誥命昭兹異數賁爾冥靈制曰至道之宗有名爲母若弗獲偕榮於前而得延澤於後則尤宜旌節而廣孝焉爾夏氏乃追贈正一嗣教崇謙養素真人張永紹之配封正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥之母守志茹蘗訓子承玄兹特錫之誥封爲靜恪玄君爾其益茂修姱永昌祚𦙌欽哉制誥萬暦二十三年五月初一日之寶奉天承運皇帝制曰朕惟皇王御宇凡祝釐陳秘錫福導民所以陰翊化理者率道教是崇爾張國祥襲蔭有年禱祈多驗心每懷乎冲退例宜示夫寵嘉兹特封正一嗣教凝誠志道闡玄弘教大真人掌天下道教事錫之誥命爾其懋培悃愫堅勵修持播真風以成家彰玄化於奕世庶裨祚運無負優崇欽哉制曰翊教軌於人倫偕榮比於恒典若乃儲徽華胄嫓美玄門則其賢尤足嘉焉正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥妻謝氏乃前宗人府事太子太保駙馬都尉詔之女系出帝乙之妹初賓仙室之支能脫濃華自甘澹泊事姑以孝修饋惟清今特錫之誥封爲靜淑玄君爾尙效代終於靜專作好逑於貞淑式增道範永副綸褒欽哉制誥萬暦三十三年五月初一日之寶
