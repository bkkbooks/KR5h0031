front:
  text: 漢天師世家卷之四
  hash: sha256:010490eba40a1ecbfb9245c6c3fb7716fb8a7f3da9373a5a800e49543735e722
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_CK-KZ_01p026a, image: JY299/CK-KZ_JY299_01p026a.png}
body:
  text: 四十四代大真人張宇淸永樂八年十月大駕南還召見命醮朝天宫授大真人誥奉天承運皇帝制曰朕惟道教崇淸虛之本極功化之妙上以陰翊皇度下以福被民庶爲世所重有自來矣爾張宇清肇自初祖精于玄理闡鴻濛之道秘賛造化之神功斯以利濟群生法傳後裔迨爾父兄皆欽承我太祖高皇帝大恩寵命俾領道教今爾兄旣逝爾當嗣之特命爾爲正一嗣教清虛冲素光祖演道大真人領道教事爾其精白一心益臻至道闡揚祖範永贊皇禧欽哉制誥永樂八年十一月二十一日之寳十一年命擇好道之士遣用勅勅正一嗣教真人張宇清爾遣道士王友來進表朕以靈應圓光圖示之彼乃不好道者觀之默無一語未終一二紙即欲起身其心誠有所不信今後差使必擇好道崇重本教者遣之庶光輔於玄門有裨益於道宗也故勅廣運永樂十一年七月初四日之寶頒賜太和圓光圖并榔梅勅勅正一嗣教真人張宇清武當天下名山真武成道靈應感化之地元末宫觀悉燬于兵遂使羽人逸士修煉學道者無所依仰朕積誠于中命創建宫觀上以資薦皇考皇妣在天之靈下爲天下生靈祈福天真感格靈應屢臻圓光燭霄榔梅垂實臣下繪圖并以榔梅來進恭以薦先頒賜廷臣用昭神貺兹特遣人齎圖及榔梅百顆賜爾爾其欽受之故勅廣運永樂十一年七月初四日之寶命選武當山住持勅勅正一嗣教真人張宇清武當天下名山真武成道靈應顯化之地元末宫觀悉燬于兵遂使羽人逸士修煉學道者無所依仰朕積誠于中命創建宫觀上以資薦皇考皇妣在天之靈下爲天下生靈祈福俾雨暘時若災沴不生年穀豐登家給人足今宫觀告成而神明屢顯休應圓光煜燁五色燦爛神像昭彰見于光內觀者數十萬人咸加歎異已賜名曰玄天玉虛宫紫霄太玄宫五龍興聖宫南巖太聖宫然此名山勝境必得高人羽士以住持看守南巖太聖宫已嘗令右正一孫碧雲爲住持外其三處爾卽選有道行者各二人爲住持别選至誠敬謹道士每處各五十人看守如一時揀選不如數隨爾所選得若千人就分派四處看守精進修行興隆道教故勅廣運永樂十一年八月二十五日之寳本年九月詔遣使詣山就大上清宫建金籙大齋七日並齎給緍錢俾市魚置放溪中賜名曰放生池禁人網釣十三年詔修大上清宫并勅建真懿觀築隄防造浮橋十五年命分獻西鎮壇命禱於福建靈濟宫瑞應獎勅勅正一嗣教真人張宇清比者洪恩真君於福建靈濟宫修建金籙大齋醮謝上真爲朕祈貺特舉爾代行科事啟壇之初陰雨開霽天日融明旣至敷宣秘典闡揚大範天人和同百靈翕集而七日之內嘉祥叠薦景貺駢臻慶雲燦五色之文寶帶騰九霄之彩神靈表見變化不測青鸞白鶴翔舞交集斯皆洪恩真君敷錫顯靈實亦由爾光揚祖範道契至真對越有嚴之所致也而洪恩真君亦稱爾敷奏勤誠上玄鑒悅非爾敬謹篤至曷克臻兹今特賜勅褒獎用伸朕懷爾尙茂隆道行益振玄風弘演清虛之教統承大道之宗翊我國家永臻至治欽哉勅命永樂十六年正月日之寳十六年召勅勅正一嗣教真人張宇清勅至爾卽帶領高道來朝故勅廣運永樂十六年二月初十日之寶本年三月命祠玄帝金像於太和山五月命治平浙江潮患十七年封孫氏玄君誥奉天承運皇帝制曰婦以夫榮國有常典道以教崇爾惟克相正一嗣教清虛冲素光範演道大真人張宇清妻孫氏懿恭生自名門來配仙裔柔嘉温靖㳟肅和平婦道式全宜膺寵錫今特封爾爲端靜真淑妙惠玄君尙克敬承永光恩命制誥永樂十七年正月初四日之寳十八年召見命率羽士千八百人修玉籙大齋本年十月又命建普度大齋於靈濟宫十九年正朔命分獻星辰壇命建保安醮七日上北伐還京命祈謝大齋瑞應獎勅勅正一嗣教真人張宇清朕比者躬率六師往征明㓂仰荷穹祗錫佑玄天上帝洪恩真君翊贊維持初庇䕶佑俾士馬咸臻康泰往復平甯永懷恩德銘刻弗忘是用命爾等修建祈恩大齋特伸昭報用表中忱爾等克承朕命齋潔至誠精嚴對越弘宣妙典揚闡宗風感孚天地神明昭錫景貺叠薦靈祥卿雲彩矞充滿太虛輪菌佈䕶或黃或青流丹曳紫五色炳煥郁郁紛紛輝霍流動升降卷舒變化不測復有祥光五色綿亘天表璘霦璀璨熠燿冲融或圓若日輪或直若垂虹或覆䕶於壇宇或映帶於宫苑山川出色草木增華天人懽慶福被幽明朕心慰悅莫罄名言兹特賜勅褒獎用昭感應之妙爾等尙益功行弘蕆宗教永贊鴻圖陰翊皇度福國利民以副朕素切之懷故勅勅命永樂十九年月日之寳二十二年命醮于太和山命建薦揚大齋瑞應獎勅勅正一嗣教真人張宇清朕惟上帝以好生爲德故玄元以惠濟爲教其體清靜無爲其用神妙無方得其妙者斯能見諸功用葢上則有以陰翊皇度下則有以福被幽明厯代所紀具有明徵朕祗承天序㳟事上帝惓惓夙夜仰惟皇考皇妣聖靈在上哀慕無極劬勞大德欲報無由敬遵道教召天下道士奉建薦揚大齋爾能恪承朕命躬率道衆致其精䖍闡揚寳範用達朕之誠悃靈貺昭答自初至于訖事天宇澄明凝寒之月雲飈不作和氣冲融瑞景式昭福應斯集固本于上帝與朕皇考皇妣之悅鑒亦爾等敬用朕命以克臻兹朕旣嘉賚之仍賜勅獎諭尙其益精爾道益篤爾行宣揚玄教上以祈福宗社下以普利生靈汝其懋哉故勅勅命永樂二十二年月日之寶宣德元年召見錫宴內殿推恩申錫嘉號勅勅正一嗣教大真人張宇清朕惟玄元之道先天地不見其始後天地不見其終根柢羣品神妙萬化然斯本體至清靜無爲故厯代崇獎用弘清靜之治焉我國家重道德之教爾父爾兄咸克祗事旣爾嗣厥職皇祖太宗皇帝錫之以美號寵之以厚恩至矣爾克篤誠敬用不忝榮命十有餘年繼事皇考仁宗昭皇帝亦克恭愼朕惟祖宗之所重也達孝推恩用申錫爾嘉號曰正一嗣教清虛冲素光祖演道崇謙守靜洞玄大真人掌天下道教事夫靜者道之太謙者德之柄澹以處靜恭以履謙靜斯安安斯一謙斯虛虛斯明簡約而息外騖篤實而有光輝務玄之道孰切於兹尙其祇服丕衍宗風懋之哉故勅加封誥原缺遣太監諭賜祭塟文缺首行諭祭曰惟爾崇修玄素志慕清虛徹法籙之科探清微之旨闡揚道範光振宗風祗事先朝累效勤懇朕纘承大統申錫嘉稱方期𤃉乃精誠導迎景貺告歸幾日奄忽長終訃音來聞良用悼歎兹特遣人賜爾祭葬靈爽不昧庶其饗之
