front:
  text: 漢天師世家卷之八
  hash: sha256:0d303111555baef141aac67ac6a174de3e8f401c5de4221b42ca7d07ad925a21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_YP-C_27yiji-07-0056b, image: JY299/27yiji-07-0056b.png}
body:
  text: 四十八代大真人張彦頨弘治十四年詔隨父入朝上御欽安殿召見命坐賜宴及玉帶綵衣之屬錫誥授正一嗣教致虛冲靜承先弘化大真人掌天下道教事正德三年命給度牒五百度羽士修建大上清宫勅勅內官監太監李文龍虎山清宫毁壞先帝常有旨修葢後因地方多事未曾舉行近該正一嗣教真人張彦頨奏乞盖造今特命爾前去彼處會同江西鎮巡等官督同都布按三司委官人等提督修盖其合用物料人力相工派辦務要照依舊式使規模停當財物堅固毋得遲延𡻕月虛費錢糧旦江西地方人民艱窘盜賊未甯爾尤宜持廉秉公安靜行事戒飭下人不許因而侵尅科害致生嗟怨斯爲爾能如違責有所歸爾其愼之愼之故勅廣運正德三年六月十二日之寶七年命陪祀泰壇十五年上南狩或言牛首山後湖各有妖召見於行在所命往除之扈駕還京嘉靖元年召問對以清心寡欲稱旨特准還山請太上延禧諸堦法籙以進三年詔聘安遠侯栁文之女爲繼室命留都內外守備官陪往親迎五年加封大真人誥奉天承運皇帝制曰朕紹膺休命祇率舊章惟治化之誕敷亦玄宗之不廢爾正一嗣教致虛冲靜承先弘化大真人張彦頨裔出炎漢道本周聃符籙得於真傳鍊養契乎樞要念蔭承之旣久奔走惟勤嘉感格之通靈禱禳多驗兹特封爲懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事錫之誥命爾尙清虛之教以益振乎玄風弘利濟之心以增光於王化永保景福敷錫羣倫欽哉制誥嘉靖五年二月初三日之寶加封勅勅正一嗣教大真人張彦頨今特加封爾爲懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事給與誥命以爲爾榮其上清宫道士傅德岩邵啟南著作大真人府贊教余永壽詹望奎著做掌書各令到任管事爾宜仰遵朕命恪守清規以祈福佑於悠久仍鈐束各官令其公勤趨事不致怠忽廢弛庶副崇重之意欽哉故諭廣運嘉靖五年二月十五日之寶命祈禱於太和山勅特諭正一嗣教大真人張彦頨今朕命爾前詣玄天福地修建清醮一以爲國大本一以爲民祈福爾務精一乃心恭䖍致恪尤須鈐束下人及差去葢府官員爾亦斟酌調理被所占地址就量復原舊惟在謹慎用心勿怠乃事庶副朕至意亦於教門有光欽哉廣運嘉靖五年二月十六日之寶重建大真人府第勅勅內官監左少監吳猷近因正一嗣教大真人張彦頨奏稱先年府第已壞乞要差官起造今特命爾前去彼處依式樣督工上緊葢造合用錢糧令彼處巡撫巡按三司等官措置應用人夫於鄰近州縣派撥到彼做工爾須計算工料如法整理務要堅實尤宜秉公持廉安靜撫䘏匠作軍夫人等俾各食息以時勞逸適均而皆樂於趨事斯爲爾能毋得因而科擾致人嗟怨如違責有所歸爾其如勅奉行故勅廣運嘉靖五年三月日之寶本年五月欽頒神像并賜印記諭司禮監太監鮑忠傳奉聖諭以所奉三清四帝列曜神像著吳猷齎去龍虎山大真人府萬法宗壇安祀併賜銀鏤掌法仙卿之印一顆牙刻宗傳之印一顆欽此詔戸部查復上清宫田糧侵匿於豪民者降勅禁護本年元陽帝君親筆書復師真幕前兹自二月師回建醮於武當山一向未聞信回今八月十八日得致一真人轉到師書一封知其遠涉暑天勞辛路次予復觀之又知師以犯人陳某欲予宥他但罪甚矣予已知之師可攝養時序以迎和氣惟大闡法妙之功弘彰利國之奧誠以格天佑予皇圖永綿萬世也予亦奉天以敬體道以德勉作政教耳又倘武當山宫觀處或至理丹册法書神物勞師訪予遂與慕道之誠心也今因使還特此以復惟師知之嘉靖五年中秋後四日六年元陽帝君書奉兹者去𡻕命師躬詣萬法祖師福地安神修醮并靜樂宫建祈嗣齋深勞真體予正思間而左至靈吳尙禮七月終至京得聞師建醮事畢回幕繼而舍人張顯等於九月方到京承以福地珍産靈物等項予謹收已今因使回特令持以誠意往答又葢造法壇府第有司慢毁不遵予命欺侮法度今已令上緊葢造卽日回話惟師暫屈仙仗以待工完日回居舊府惟師知詧嘉靖六年九月吉日七年命陪祀星辰壇十一年重修大上清宫勅勅內官監左監丞曹玉江西龍虎山上清宫殿宇年久損壞卽上緊修理完備其勅建仙源宫照依降去圖樣如式葢造務各基址堅固棟宇壯實以圖永久用稱朕事神之至今特命爾前去會同彼處撫按官督同該司府等官查照先年事例一併修造合用物料夫匠錢糧悉照該部題准事理處置應用務要綜理周密區畫得宜爾爲內臣受兹委任尤須持廉秉公安靜行事撫䘏匠役人等俾食息以時勞逸適均樂於趨事斯爾之能毋得因而縱容科擾役占刁蹬需索致生嗟怨自取罪愆事完將修葢過殿宇支用過錢糧數目造册奏繳爾其愼之故勅廣運嘉靖十一年三月初七日之寶十四年准照舊蠲免通戸差徭旨該戸部欽奉聖旨正一大真人不是今日的我皇祖已有恩旨所奏都准他有司不許欺慢你每但知賣公爾且不查究特命悉蠲之十六年提問沿途違慢官吏旨聖旨張彦頨總頒道教赴京朝賀先朝屢有明旨著沿途有司應付各該地方官吏如何不行支給著巡按御史查提了問巡撫官且不查究今後務要嚴加戒飭軍衛有司一體應付不許遲違誤事該衙門知道本年命祈雪於內庭賜金冠玉帶法器銀幣之屬十七年正月命建金籙大齋於內皇壇賞賚有加命沿途衙門照例應付勅勅正一嗣教懷玄抱真養素守默葆光履和致虛冲靜承先弘化大真人掌天下道教事張彦頨得爾奏稱每三載依例朝覲沿途經過有司衙門不肯照例應付以致道路多阻赴朝失期先年奏有明旨又復違背等因兹降勅旨以護爾凡爾朝賀等項來京往迴經過處所軍衞有司驛遞等衙門卽便照例一體應付不許留難敢有仍前怠慢誤事聽爾指實奏聞處治其欽承之故勅廣運嘉靖十七年二月初四日之寶本年命往齊雲巖修醮勅勅正一大真人張彦頨往𡻕嘗命真人李得晟恭詣齊雲巖北極真武神祠建醮禱祀果獲靈應今特命卿詣彼處修齋醮一以謝神一以上祈母壽事畢卿還山著隨去高士聶衣然回奏卿經過去處軍衛有司驛遞等衙門卽便照例應付不許欺慢留難如有不遵勅旨故違誤事者聽卿奏聞處治故勅廣運嘉靖十七年二月十九日之寶十八年准奏齊雲山如太和山例除官道住持管理賜神宫名曰玄天太素宫仍免本山香錢解京降勅禁護聖母升遐示哀手書象一帝君書奉正一嗣教張真人幕下予真積深愆不自罹上喪慈親於戊戌之十二月四日徒裂五內之已矣復於南幸親視陵園人處是時可不重傷耶况母壽未臻於中淹患連𡻕以朝繼夕以夕繼朝指望安復何期二聖同棄我哀哉聊書予苦衷以告哀餘不備師其亮我云元陽嘉靖十八載孟秋吉日象一拜寶記賀生子書象一帝君書奉正一師昨月得聞天垂眷于宗領道嗣開源予喜不已須旦夕保視兹使回順令持物爲賀至可收納不備元陽𣶬極己亥𡻕季冬吉日象一書奉象一帝君寶十九年暫免入朝勅皇帝勅諭正一嗣教大真人張彦頨朕惟我皇祖之制天下大小衙門官員凡三𡻕一朝覲卿亦在與焉重爾教也今年又當其期朕念卿中年方得一子矧在襁褓或難遠離特遣行人黃如桂往諭今次特暫免卿來俾卿得專守視見朕保愼爾嗣之意卿其欽承之哉故諭勅命嘉靖十九年五月初五日之寶二十一年贈朱氏宋氏玄君誥奉天承運皇帝制曰母之於子旣均教育之勞君之於臣必體顯揚之願事有關於風化恩豈限於常科爾朱氏乃已故太師兼太子太傳成國公儀之女今正一嗣教大真人掌天下道教事張彦頨之嫡母勳門毓秀宦族揚芬行儉且勤性柔而正相夫契清微之妙教子敦玄素之誠邦國藉以祝釐羽風因之丕闡爰推懿訓用錫綸章兹特贈爲端柔順德玄君錫之誥命賁光寵於九原衍休聲於百世制曰子以母賢信慶源之有自母因子貴宜恩典之是加顧兹玄教之臣可恡褒嘉之命爾宋氏乃錦衣衞指揮使清之女今正一嗣教大真人掌天下道教事張彦頨之生母簮纓茂族閥閱名家賦性温柔克著儉勤之德持身端謹式資清靜之風揆厥所由宜申褒錫兹特贈爲柔慈崇善玄君錫之誥命服此隆恩永光泉壤制誥嘉靖二十一年三月初九日之寶贈李氏吳氏柳氏爲玄君誥奉天承運皇帝制曰褒崇之錫以報賢勞恩命之頌實旌賢淑此朝廷之著典也正一嗣教大真人掌天下道教事張彦頨妻李氏乃襄城伯鄌之女系出勳門早歸玄族克修婦道懋著賢聲爰推寵異之章實體爾夫之請兹特贈爲冲虛柔惠玄君鍚之誥命敬服殊恩光爾幽室制曰臣有事君之誠褒榮宜厚婦有從夫之義寵命惟均風化所關存亡奚間正一嗣教大真人掌天下道教事張彦頨繼妻吳氏乃錦衣衞指揮使𤪙之女蚤承姆訓作配名門淑愼有儀柔嘉維則陰翊玄教裨益良多兹特贈爲安妙善常玄君鍚之誥命冥漠有知承此優眷制曰朝廷推恩臣下必褒榮其妻所以厚人倫之本勵相成之道也正一嗣教大真人掌天下道教事張彦頨繼妻柳氏乃安遠侯文之女出自勳門于歸宦族性資淑愼容止柔嘉默相玄風式彰令聞兹特贈爲莊惠志道玄君錫之誥命靈爽如存歆承渥命制誥嘉靖二十一年三月初九日之寶本年命給部牒五百度羽士勅江西巡撫禁約撫州民私造僞籙二十二年再免入朝勅皇帝勅諭正一嗣教大真人張彦頨朕惟我皇祖之制天下大小衙門官員凡三𡻕一朝覲卿亦在與焉蓋以卿教宗之後故重之也前𡻕朕念卿子幼免來今年又當其期卿子尙難遠離特遣錦衣衛百戶喬鑑齎勅往諭再暫免卿來朝俾得專守視見朕保愼爾嗣之意卿其欽承之哉故諭勅命嘉靖二十二年五月十五日之寶二十八年詔携嗣子入朝比至都門上遣太監高忠傳諭慰勞齎賜嗣子衣帶明日召見錫宴便殿命錄厯代真人名諱進覽上親灑宸翰賜曰卿子名可曰永緖准奏致仕詔永緖嗣教襲爵三十九年特賜侯爵例祭葬卿典諭聖諭朕正思於二月差官免正一大真人來朝俾其侍親弗期昨仲冬伊父故矣著照侯爵例給與葬資齋糧麻布一百石疋祭十三壇便行文所司遵行仍差千戸一員行人一員去諭免嗣真人來朝并督視掌行喪禮該部知道詔遣行人司行人李琦諭祭同錦衣衛千戸王正億督視掌行喪禮旗校二十名偵察違慢員役勅下該部如儀以弋陽縣城東叠山書院遷改爲葬地復詔遣錦衣衞千戸温堯民督催原差官役作速如侯爵例禮數造完葬諭祭十三壇文嘉靖四十年月日皇帝遣行人司行人李諭祭正一嗣教大真人張彦頨卿受國恩嗣領道教存神淵默養性冲虛祝釐爲民宣勞著績以時入覲簡在朕心式重高風屢頒寵渥宜延遐祉以疾告終訃音來聞良用悼惜特加䘏典賜祭遣官仍令有司爲營兆域卿靈不昧渙命祇承諭祭首七并七七文曰卿凝玄守靜綽有祖風闡教匡時厥功允茂胡爲奄逝某七倐臨遣祭有儀歆承無斁諭祭百日窀穸週基再期禮除文曰卿神逰仙境跡化玄都緬憶真風渙施䘏典日月云邁某期倐臨諭祭載須尙其歆服
