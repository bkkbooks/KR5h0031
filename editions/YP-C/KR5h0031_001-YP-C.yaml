body:
  text: 賀生子手書暫免入朝勅贈朱氏宋氏玄君誥贈李氏吳氏桞氏玄君誥再暫免入朝勅御札賜嗣子名特賜侯爵例祭葬䘏典諭遣行人諭祭文卷之九授四十九代大真人誥賜伯爵服旨賜增應付旨暫免入朝勅申勅所司照舊優免給與新例勘合應付旨諭有司官員人等不許欺慢勅封徐氏元君誥禁族屬人等侵害勅遣行人諭祭文重刋道蔵輯要漢天師世家卷之一太祖高皇帝賜龍虎山二十代天師賛第一代張道陵驅風疾霆機斡萬靈亶惟神智使濁而淸道常無隱滿腹仙經鹿奔虎乘儵然上升第二代張衡步武飛虛至妙而樞握符而决神駕羊車周旋玉京萬里須臾坎離是會深淵躍魚第三代張魯載承載闡松底爐煙夭桃洞蕊實實三千白鶴趐空巖下鹿眠九霄環珮火棗年年第四代張盛繼符繼經上徹天庭永張斯教轉斗移星朝遊北海蒼松暮迎一祖師志鹿車是乘第五代張昭成袖劍而趨光射斗墟萬靈咸聽神步天衢斬妖縛邪與師無殊禦災捍患氣吐而舒第六代張椒鉛汞成砂煙結紫霞洞裏乾坤春意桃花不善人師不已而誇壺中日月更何以加第七代張回撫鹿蒼松羽扇登峯道合無爲繼師而封不善而善密有神功知常守默樂道從容第八代張迥如不尙俗愛居茅屋白鶴一雙猶騎麃鹿月下星奔使黃而綠道氣常存𡻕𡻕辟穀第九代張符醉眠松底白雲籠衣似酩酊醒役使幽微至神有設鶴趐劍飛羣妖歛迹巨怪悉夷第十代張子祥洞花纔綻春松翠微高卧白雲仙茅爲衣呼泉叱咤役劍神飛無上至真可以爲竒第十一代張通玄演黃梁幻運鍾離機驅雲以從致雷電飛萬壑松聲丹光夜宜鶴氅飄然煙霞是宜第十二代張恒道德齊名鞭雷䇿霆按劍瞑目妖氣不生神遊八極上至天京宜哉宿緣物外常明第十三代張光九轉靈鉛砂汞當先茅飛去處妖鬽倒懸神樞怒目下察黃泉仰觀三界浩氣如煙第十四代張慈正朝降崇巔酤入市𠪨過飮弗醉暮歸紫煙山雲松掃洞鎻千年和光同塵玄之又玄第十五代張高漆園善紀槐國昭然同此幻化千古尙傳師能善已乃達於仙虛靈不昧道氣常全第十六代張應韶繼傳十六人皆辟穀日食黃精貌態異俗𡻕月以來亦復如復牛背西風蒼山一曲第十七代張頥至危而全難去而天乃知爾仙乃知爾賢流派十七道氣陵煙孰謂其顛孰謂有緣第十八代張士元飛符有驗始祖有傳至於斯世名播八埏丹光上升斗氣愈鮮精神徘徊常在三天第十九代張修嵐光蔽山丹氣雜然飛符檄鬼無敢不前孰謂爾靈孰謂爾玄掛冠解衣樂道便便第二十代張諶冠山衣雲道氣常淳芬子有機鐺內猶渾盤中數著黑白星奔無上至妙丹田厚坤
