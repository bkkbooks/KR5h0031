front:
  text: 漢天師世家卷之三
  hash: sha256:9837c9db97a2de6627e3b08d372edffa869337548642c38cd2d00602c38c08b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_YP-C_27yiji-07-0020a, image: JY299/27yiji-07-0020a.png}
body:
  text: 四十三代大真人張宇初洪武十三年授大真人誥奉天承運皇帝制曰朕聞上古之君天下者民從者四曰士農工商而始漢至今率民以六加釋道焉所以道明者由爾宇初之祖通神善幻化能恍惚升入太虛昌廓落之罡風吞宇宙之浩氣以是利濟羣生功著厯代所以法傳之久香燈之永蓋爲行深願重德敷上下精神愈靈前真人旣往爾當世嗣特遣使詣府命爾爲正一嗣教道合無爲闡祖光範大真人領道教事爾其慎哉欽哉制誥洪武十三年二月二十八日之寶特召入朝勅皇帝勅諭前真人張正常嗣子宇初昔之能名於海內始漢至今所以不泯者盖爲禦灾捍患之妙功達於君利及於民故有不泯者爲此也邇聞服制且終當正教中之首率徒以修符至一來朕當諭爾爾其不貳其心則上下格矣故兹勅諭勅命洪武十三年二月二十八日之寳賜勉修節以格神明勅諭正一嗣教大真人張宇初書秘訣奥在繼傳不息也其運玄元之真而驅萬靈如影響則用已之際神以契符訣之妙則繼傳不息之道豈不倐哉而感應也歟否若是雖善秘書精指訣雖萬千之熟亦何應哉且爾祖至今繼世名世者以其禦灾捍患也爾正幼年當節修節潔精魂思與神通有時則當用之際神必爾赴故兹勅諭十四年封包氏玄君誥奉天承運皇帝制曰人臣有名位者婦以夫榮母以子貴此古今令典也爾正一嗣教真人張宇初母包氏篤生賢子克紹玄宗特封清虛冲素妙善玄君爾惟敬哉以承恩命制誥洪武十四年正月二十日之寶十六年勅召赴京命建玉籙大齋於紫金山十八年命醮禱雨於神樂觀二十三年特勅重建太上清宫二十四年六月初一日禁私出符籙旨該禮部欽奉聖旨江西浙江福建等處多有假借張真人名色私出符籙惑民取財令出之後犯則斬首示衆家遷化外欽此八月頒給龍虎山正一玄壇之印俾鎮䕶名山闗防符籙三十五年賜緡錢葺太上清宫永樂元年命陪祀天壇四年命編進道書勅勅真人張宇初前者命爾編修道教書可早完進來通類刋版故勅廣運永樂四年十一月十九日之寶五年命建齋有應獎勅勅正一嗣教真人張宇初朕惟玄元之教統大道之宗闔闢陰陽斡運神化混融三界總攝萬靈行其道者非精誠之至曷能感通比者仁孝皇后崩逝特命爾率諸道衆爰舉薦揚啟玉籙之齋科宣琅函之秘典百日之內瑞應駢臻燁五色之慶雲爛九天之瑞靄靑鸞繚繞於琳館白鶴飛舞於瑶壇五色祥光通明徹夜斯皆由爾法承先祖道契至真探玄牝之微賛虛無之化克遵朕命以展純誠曁諸道衆修持善行葆練精和執恪秉䖍輔勤昭事其中亦有至人道化高妙出顯入微靈變不測感朕誠心來臨法會證盟善功朕德薄所未能知者藉兹衆善是以上玄響答茂集嘉禎覩兹感應之彰明允想神靈之獲慶超登大梵永遂逍遥式副朕懷特申嘉獎爾其益懋神功愈致精一洞明妙化渾合無爲弘闡宗風翼我皇度欽哉故勅廣運永樂五年十月十五日之寶六年三月奉聖旨符籙一節止許張真人門下出給欽此四月命進太上延禧籙建齋五壇禮成特命更給驛劵還山命邀請真仙張三仹勅勅真人張宇初今發去請張真仙書一通香一炷真仙到山中爾卽投此敬邀一來以慰朕企佇之誠故勅廣運永樂六年十月初七日之寳七年再命尋訪張三仹勅勅與張真人爾可用心尋訪張三仹老師傳此數日我心神有將與相遇之意如得見爾可與之同來須厚加禮遇切勿輕忽故勅廣運永樂七年八月十三日之寶八年大駕駐蹕北京皇太子監國遣行人陳逵賜祭曰卿夙究玄範紹乃祖風守素抱冲光闡教事祝釐迎嘏用效勤勞膺受恩榮厯有年𡻕何其一旦遽然長逝聞之悼傷爰特賜祭惟靈不昧庶其饗之九年天衷追悼遣行人蕭榮特加諭祭曰爾懷清靜頤真葆和究洞玄太微之秘明無極自然之體游神太素秉握道樞呼吸風霆斡運靈化光揚祖範綱領玄宗上以陰翊皇度下以濟㧞羣生方期永賛於鴻禧何以翛然而羽化爰特遣人賜祭用示朕懷爾其饗之
