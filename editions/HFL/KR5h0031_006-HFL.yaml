front:
  text: 皇明恩命世録卷之六
  hash: sha256:814724f871af83a5d80bc86d2e22e99b46c64246c05143f0108850ab57be5a6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_006-001a, image: hfl/1065/1065-092.png}
body:
  text: 四十六代大真人張元吉正統十年召見于内庭命坐賜茶錫誥授正一嗣教冲虛守素紹祖崇法大真人十一年召見賜宴仁智殿贈父張留綱真人誥奉天承運皇帝制曰朕惟國家之扵臣下必推恩及其親者所以重所本也爾張留綱乃正一嗣教冲虛守素紹祖崇法真人元吉之父宜承道蔭而不永年今因爾子推恩贈爾爲正一嗣教崇玄養素寂靜真人咨爾冥靈欽承榮命制誥正統十一年六月二十二日之寳封母高氏爲玄君誥奉天承運皇帝制曰妻隨夫榮朝廷之大恩母隨子貴國家之常典爾贈正一嗣教崇玄養素寂靜真人張留綱之配乃正一嗣教冲虛守素紹祖崇法大真人元吉之母守志玄門以成厥子兹特封爲慈惠靜淑玄君服此榮恩益隆母道欽哉制誥正統十一年六月二十二日之寳十二年禁約族屬人等欺害敕皇帝勅諭温靜柔順玄君董氏朝廷維持道教重在保善懲惡用圖長久囊者前真人張懋丞没已命嫡孫張元吉龔承眞人之職以領教事其族屬人等數加欺害已犯者悉治以法仍命該衙門移文巡按三司等官敢有仍前玩法欺害者悉治以罪今賜勅張元吉勉勵進修用承教事及令道士高縉雲周應瑜爲賛教官彦矩席克中爲掌書專一輔助張元吉行爾玄君係其祖母夙受封命凡一應在家之事宜早晩訓誨爾孫令勉學修行加意保佑用臻成立庶爲爾宗嗣之福但在外合行之事令與高縉雲等商確而行務在至當庶圖長遠果有族屬人等仍前分外生事謀害爾家者令高縉雲等具實告達御史三司等官依法拿問奏來治罪不宥或高縉雲等恃此欺凌爾孫元吉爾亦指實赴御史三司等官陳告一體拿問爾尤宜嚴以治家恩以睦族戒飭家人毋侵害彼衆庶稱朝廷眷待之意亦克永保爾家欽哉故諭勅命正統十二年五月二十五日之寳頒賜藏經㫖皇帝聖㫖朕體天地保民之心恭成皇曾祖考之志刊印道藏經典頒賜天下用廣流傳兹以一藏安奉龍虎山大上清宫永充供養聽所在道官道士看誦讚揚上爲國家祝釐下與生民祈福務須祗奉守護不許縱容閑雜之人私借觀玩輕慢褻瀆致有損壞遺失違者必究治之諭勅命正統十二年八月初十日之寶十四年命分獻星辰壇七月皇后命建保安醮于内庭景泰元年命建保安醮于大德觀二年勅給部牒一千俾度羽士三年命醮于内庭禮畢賜宴仁智殿四年命分獻風雲雷雨壇命醮于朝天宫六年命醮于靈濟宫錫誥加封正一嗣教冲虛守素紹祖崇法安恬樂靜玄同大眞人掌天下道教事賜法劎一口特遣中官護送還山天順元年二月召見命建祈謝醮于庭本年禁諸人私岀符籙勑勑正一嗣教冲虛守素紹祖崇法安恬樂靜玄同大真人掌天下道教事張元吉朕惟國家崇奬道教所以㣲顯闡幽祝釐庇民而助雍熙太和之盛治也然必本其源斯能神其法盖自祖宗以來清理道教未嘗廢也近聞各處有假借張真人名色私出符籙惑民取財甚非道教本源神法之意爾張元吉乃故真人張懋丞之長孫昔朕在御已命襲祖職事念爾幼孤恐罹䧟害嘗以勑禁約今復賜勑俾爾親族人等并本山宫觀道士務要各循禮法崇重敬信不許欺侮侵凌生事迨有仍前假爾名色私出符籙一體治以重罪爾宜清心勉學祗承玄範茂闡宗風毋墜先業尚欽承之毋忽故勅廣運天順元年七月初一日之寳三年召見賜宴内庭再命進太上延禧籙四年上御齋宫召對加封高氏爲太玄君誥奉天承運皇帝制曰朕惟神明之胄國家所崇嗣其教者旣有真人之封爲之室者復有玄君之命所以嘉奬玄元之道扵無窮也爾慈惠靜淑玄君高氏乃追贈正一嗣教崇玄養素寂靜真人留綱之妻封正一嗣教冲虛守素紹祖崇法安恬樂靜玄同大真人掌天下道教事元吉之母早失所天守節孀居撫育孤幼克底成立時惟丕振宗風皆爾之力也兹特加爾爲太玄君封號如舊錫之誥命以示褒旌爾尚益勵貞潔以迓景福用昭恩寵欽哉制誥天順四年二月初六日之寳五年四月上遣使至山召赴闕俾醮于大内玄天祠七月命就朝天宫修祈謝禳熒醮禮畢召對准奏大赦天下六年三月准辭還山抵潞河上特遣錦衣衛百户劉昇令以原給符驗外加撥馬快舡追送八年命建禬謝醮于内庭錫誥加封正一嗣教體玄悟法淵默靜虛闡道弘化妙應大真人再加封高氏太玄君誥奉天承運皇帝制曰朕惟神明之胄克闡玄元之道者國家旣褒顯之而又加恩於其親所以重原本而廣孝道於無窮也爾慈惠靜淑太玄君高氏乃正一嗣教體玄悟法淵默靜虛闡道弘化妙應大真人掌天下道教事張元吉之母早失所天孀居守節撫育孤幼克振宗風婦道母儀昭于閨閫眷兹玄行宜用褒旌兹特父封爾爲慈和端惠貞淑太玄君錫之誥命以昭異數爾尚益勵善德迓景福於悠久欽哉制誥天順八年七月十二日之寳成化元年上御文華殿召見賜宴殿中二年正月上遺中官以天廐良馬及文錦朱履酒果之屬齎賜爲壽翌日仍賜宴内庭十一日命分獻風雲雷雨壇二月命建昇真醮于大德觀申禁假造符籙勅勅正一嗣教體玄悟法淵默靜虛闡道弘化妙應大真人張元吉朕惟道教有護國庇民之功國法有佑善懲惡之典此理勢相資不可缺者也爾先世乃神明之裔代以嫡長相承掌領道教其來久矣迨爾幼孤族屬人欲相侵奪賴我先帝聖明特命爾襲授爾祖張懋丞真人之職乃賜勅禁約維持用底安全尚慮事久人頑或生妬害復賜爾勅俾爾親族人等各遵禮法崇重玄教不許越分侵犯及不許一應無藉之徒假爾名色私出符籙取財有乖道法違者俱治以重罪不饒仍命道士鄧玉玄王紹通爲賛教林智茂朱文吉爲掌書助爾行事尚體朕至懷恪精玄教茂振宗風爲國祝禧爲民祈福以副朝廷崇奬之意欽哉故諭廣運成化二年三月日之寳三年上御大善殿召對聖語勉以護國保民特恩更給金鏤正一嗣教大眞人府印并玉印御書大真人府四字賜縣於府第閥額錫誥加封正一嗣教體玄崇默悟法通真闡道弘化輔德佑聖妙應大真人掌天下道教事仍遣中官秦勤齎賜蟒衣玉帶之屬五年命醮于朝天宫皇眀恩命世録卷之六
