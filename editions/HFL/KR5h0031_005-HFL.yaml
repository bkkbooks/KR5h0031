front:
  text: 皇明恩命世録卷之五
  hash: sha256:e1ea5ef366f129f16406cec6b83793c897fa043cd6f1b80d36a915b5c42db017
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_005-001a, image: hfl/1065/1065-082.png}
body:
  text: 四十五代大真人張懋丞洪武三十二年初父張宇珵蒙太祖高皇帝聞其賢與無爲真人宇初同被召對稱㫖特命御史中丞護軍誠意伯劉基以其弟之女妻之宣德二年召見賜宴便殿四年召問命進太上延禧籙仍命建延禧醮于大内四月命陪祀太廟授大真人誥奉天承運皇帝制曰朕惟玄元之道清靜無爲根抵群倫神妙萬化上陰翊扵治理下利澤扵生靈歷代以來咸加奬勵爾張懋丞自其先世崇修至道爾祖爾伯皆克祗承今爾當嗣特命爾爲正一嗣教崇修至道葆素演法大真人領道教事爾其虔奉玄範茂振宗風導迎鴻禧翼賛皇祚欽哉制誥宣德四年四月日之寳五年命分獻東鎮壇命醮于仁智殿三月上御西宫召對詔授上清宫高道操克弘龔繼宗穎福淵黄嘉佑等道録官仍遣中官黎都至山起之贈孫氏玄君誥奉天承運皇帝制曰國家崇奬道教於正一真人之嗣旣有褒封而其嗣之内助盖亦與榮焉正一嗣教崇至道葆素演法大真人領道教事張懋丞妻孫氏方當内助而遽殞逝今追贈爲柔惠貞靜玄君靈爽不昧尚克膺承制誥宣德五年閏十二月二十日之寳六年命分獻星辰壇命醮于内皇壇四月命陪祀太廟禮畢特遣中官護送還山九年命醮于靈濟宫命分獻風雲雷雨壇三月命建保安醮于大德觀勅給部牒五百俾度羽士五月御製招隱歌賜之准辭還山抵甲馬營傳舍上復遣使追授宻勅勉進修煉之學以衍宗風正統元年勅建天師府扵朝天宫内東北隅特詔禮官迎入府居之命修昇真大齋于朝天宫二年正旦賜宴于奉天殿十一日命分獻風雲雷雨壇明日召見繼召衍聖公同宴便殿仍各賜蟒衣朱履之屬本月命進太上延禧籙四年命分獻東鎮壇二月皇太后聖壽建祈祝醮于朝天宫五年封董氏爲玄君誥奉天承運皇帝制曰國家以道教有陰翊皇度之功原其所始用顯其子孫而復摧恩於室家亦恒典也正一嗣教崇修至道葆素演法大真人領道教事張懋丞繼室董氏宜從夫貴特錫之誥封爲温靜柔順玄君爾其欽承榮命永肅乃家欽哉制誥正統五年二月日之寳本年三月命建安玄帝金像醮于太内玄天祠六年命分獻東鎮壇勅給部牒五百俾度羽士七年上御文華殿召見賜宴殿中八年命分獻星辰壇
