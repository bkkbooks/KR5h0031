front:
  text: 皇明恩命世録卷之三
  hash: sha256:26b2bf665a4bf4d34128b86ee12c9955521d22bda7c1af226a3b437f4c72db52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_SJB_003-340791b, image: sjb/34/340791b.png}
body:
  text: 四十三代大真人張宇初洪武十三年授大眞人誥奉天承運皇帝制曰朕聞上古之君天下老民從者四曰士農工商而始漢至今率民以六加釋道焉所以道明者由爾宇初之祖通神善幻化能恍惚升入太虛冒廓落之罡風吞宇宙之浩氣以是利濟群生功著歷代所以法傳之久香燈之永盖爲行深願重德敷上下精神愈靈前盖人旣徃爾當世嗣特遣使詣府命爾爲正一嗣教道合無爲闡祖光範大眞人領道教事爾其慎哉欽哉制誥洪武十三年二月二十八日之寳特召入朝勑皇帝勑諭前真人張正常嗣子宇初昔之能名扵海内始漢至今所以不泯者盖爲禦災捍患之妙功達扵君利及於民故有不泯者爲此也邇聞服制且終當正教中之首率徒以修符至一來朕當諭爾爾其不貳其心則上下格矣故兹勑諭勑命洪武十三年二月二十八日之寳賜勉修節以格神明敕諭正一嗣教大真人張宇初書秘訣奥在繼傳不息也其運玄元之真而驅萬靈如影響則用己之際神以契符訣之妙則繼傳不息之道豈不倏哉而感應也歟否若是雖善秘書精指訣雖萬千之熟亦何應哉且爾祖至今繼世名世者以其禦災捍患也爾正幼年當節修節潔精魂思與神通有時則當用之際神必爾赴故兹勑諭十四年封包氏玄君誥奉天承運皇帝制曰人臣有名位者婦以夫榮母因子貴此古今令典也爾正一嗣教真人張宇初母包氏篤生賢子克紹玄宗特封清虛冲素妙善玄君爾惟敬哉以承恩命制誥洪武十四年正月二十日之寳十六年勑召赴京命建玉籙大齋於紫金山十八年命醮禱雨於神樂觀二十三年特勅重建太上清宫二十四年六月初一日禁私岀符籙㫖該禮部欽奉聖㫖江西浙江福建等處多有假借張真人名色私出符籙惑民取財令出之後犯則斬首示衆家遷化外欽此八月須給龍虎山正一玄壇之印俾鎮護名山関防符籙三十五年賜緡錢葺大上清宫永樂元年命陪祀天壇四年命編進道書敕勑真人張宇初前者命爾編修道教書可早完進來通類刊版故勅廣運永樂四年十一月十九日之寳五年命建齋有應奬敕勅正一嗣教眞人張宇初朕惟玄元之教統大道之宗闔闢陰陽斡運神化混融三界總攝萬靈行其道者非精誠之至曷能感通比者仁孝皇后崩逝特命爾率諸道衆爰舉薦揚啓玉籙之齋科宣琅函之秘典百日之内瑞應駢臻燁五色之慶雲爛九天之瑞靄青鸞繚繞於琳館白鶴飛舞扵瑶壇五色祥光通明徹夜斯皆由爾法承先祖道契至真探玄之㣲賛虛無之化克遵朕命以展純誠暨諸道衆修持善行葆練精和執恪秉虔輔勤昭事其中亦有至人道化高妙出顯入微靈變不測感朕誠心來臨法會證盟善功朕德薄所未能知者藉兹衆善是以上玄響答茂集嘉禎覩兹感應之彰明允想神靈之獲慶超登大梵永遂逍遥式副朕懷特申嘉奬爾其益懋神功愈致精一洞明妙化渾合無爲弘闡宗風冀我皇度欽哉故勅廣運永樂五年十月十五日之寳六年三月奉聖㫖符籙一節止許張真人門下出給欽此四月命進太上延禧籙建齋五壇禮成特命更給驛券還山命邀請真仙張三丰敕勅真人張宇初今彂去請張真仙書一通香一炷真仙到山中爾即投此敬邀一來以慰朕企佇之誠故勑廣運永樂六年十月初七日之寳七年再命尋訪張三丰伴說與張真人爾可用心尋訪張三丰老師傳此數日我心神有將與相遇之意如得見爾可與之同來須厚加禮遇切勿輕忽故勑廣運永樂七年八月十三日之寳八年大駕駐蹕北京皇太子監國遣行人陳逵賜祭曰卿夙究玄範紹乃祖風守素抱冲光闡教事祝釐迎嘏用效勤勞膺受恩榮厥有年歲何其一旦遽然長逝聞之悼傷爰特賜祭惟靈不昧庶其饗之九年天衷追悼遣行人蕭榮特加諭祭曰爾懷清靜頥真葆和究洞玄太㣲之秘明無極自然之體游神太素秉握道樞呼吸風霆斡運靈化光揚祖範綱領玄宗上以陰翊皇度下以濟㧞群生方期永賛於鴻禧何以翛然而羽化爰特遣人賜祭用示朕懷爾其饗之皇明恩命世録卷之三
