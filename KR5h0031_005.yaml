front:
  text: 皇明恩命世録卷之五
  hash: sha256:e1ea5ef366f129f16406cec6b83793c897fa043cd6f1b80d36a915b5c42db017
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_005-001a, image: hfl/1065/1065-082.png}
body:
  text: 四十五代大真人張懋丞洪武三十二年初父張宇珵蒙太祖高皇帝聞其賢與無為真人宇初同被召對稱旨特命御史中丞護軍誠意伯劉基以其弟之女妻之宣德二年召見賜宴便殿四年召問命進太上延禧籙仍命建延禧醮于大內四月命陪祀太廟授大真人誥奉天承運皇帝制曰朕惟玄元之道清靜無為根抵群倫神妙萬化上陰翊于治理下利澤于生靈歷代以來咸加奬勵爾張懋丞自其先世崇修至道爾祖爾伯皆克祗承今爾當嗣特命爾為正一嗣教崇修至道葆素演法大真人領道教事爾其虔奉玄範茂振宗風導迎鴻禧翼贊皇祚欽哉制誥宣德四年四月日之寶五年命分獻東鎮壇命醮于仁智殿三月上御西宫召對詔授上清宫高道操克弘龔繼宗穎福淵黃嘉佑等道録官仍遣中官黎都至山起之贈孫氏玄君誥奉天承運皇帝制曰國家崇奬道教於正一真人之嗣既有褒封而其嗣之內助蓋亦與榮焉正一嗣教崇至道葆素演法大真人領道教事張懋丞妻孫氏方當內助而遽殞逝今追贈為柔惠貞靜玄君靈爽不昧尚克膺承制誥宣德五年閏十二月二十日之寶六年命分獻星辰壇命醮于內皇壇四月命陪祀太廟禮畢特遣中官護送還山九年命醮于靈濟宫命分獻風雲雷雨壇三月命建保安醮于大德觀敕給部牒五百俾度羽士五月御製招隱歌賜之準辭還山抵甲馬營傳舍上復遣使追授密敕勉進修煉之學以衍宗風正統元年敕建天師府于朝天宫內東北隅特詔禮官迎入府居之命修升真大齋于朝天宫二年正旦賜宴于奉天殿十一日命分獻風雲雷雨壇明日召見繼召衍聖公同宴便殿仍各賜蟒衣朱履之屬本月命進太上延禧籙四年命分獻東鎮壇二月皇太后聖壽建祈祝醮于朝天宫五年封董氏為玄君誥奉天承運皇帝制曰國家以道教有陰翊皇度之功原其所始用顯其子孫而復摧恩於室家亦恆典也正一嗣教崇修至道葆素演法大真人領道教事張懋丞繼室董氏宜從夫貴特錫之誥封為溫靜柔順玄君爾其欽承榮命永肅乃家欽哉制誥正統五年二月日之寶本年三月命建安玄帝金像醮于太內玄天祠六年命分獻東鎮壇敕給部牒五百俾度羽士七年上御文華殿召見賜宴殿中八年命分獻星辰壇
