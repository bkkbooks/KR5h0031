  - {type: variant, offset: 30, length: 755, content: 賜褒天師㫖命普施符水㫖命選精道法師赴闕書授四十二代天師大真人誥改贈三十九代天師大真人號改封仙姑胡氏玄君號加授永掌道教事誥遣代祀嵩山勑御製諭祭文卷之三授四十三代大真人誥特召入朝勑賜勉修節以格神明勑封包氏玄君誥禁私出符籙㫖成祖文皇帝永樂紀年命編進道書勑命齋事有應奬勑命專出符籙㫖命邀請真仙張三丰勑再命尋訪張三丰勑遣行人諭祭文皇太子遣祭文卷之四授四十四代大真人誥命擇好道之士遣用勑頒賜太和圓光圖并榔梅勑命選武當山住持勑命禱于福建靈濟宫瑞應奬勑召勑封孫氏玄君誥命祈謝大齋瑞應奬勑命建薦揚大齋瑞應奬勑宣宗章皇帝宣德紀年推恩申錫嘉號勑加封誥遣太監諭賜祭塟文卷之五授四十五代大真人誥贈孫氏玄君誥英宗睿皇帝正統天順紀年封董氏玄君誥遣禮部郎中工部主事諭賜祭塟文卷之六授四十六代大真人誥贈父真人誥封母高氏玄君誥禁約族屬人等欺害勑頒賜藏經㫖禁諸人私出符籙勑加封高氏太玄君誥再加封高氏太玄君誥景皇帝景泰紀年加封四十六代大真人誥憲宗純皇帝成化紀年申禁假造符籙勑再加封四十六代大真人誥卷之七授四十七代大真人誥封母吴氏玄君誥申禁僞造符籙勑孝宗敬皇帝弘治紀年賜准致仕勑賜褒問書諭禁止僞造符籙敕賜畫軸銀幣敕命賫香儀敇卷之八授四十八代大真人誥武宗毅皇帝正德紀年修建大上清宫勑世宗肅皇帝嘉靖紀年加封大真人誥加封大真人勑命祈禱于太和山勑重建大真人府第勑欽頒神像并賜印記諭重修大上清宫勑准照舊蠲免通户差徭㫖提問沿途違慢官吏㫖命沿途衙門應付勑命徃齊雲山修醮勑聖母升遐示哀手書賀生子手書暫免入朝勑贈朱氏宋氏玄君誥贈李氏吴氏柳氏玄君誥再暫免入朝敕御札賜嗣子名特賜侯爵例祭塟卹典諭遣行人諭祭文卷之九授四十九代大真人誥賜伯爵服㫖賜增應付㫖暫免入朝勑申勑所司照舊優免給與新例勘合應付㫖諭有司官員人等不許欺慢勑封徐氏元君誥禁族屬人等侵害勑遣行人諭祭文皇明恩命世録總目, CK-KZ: ''}
