front:
  text: 皇明恩命世録卷之一書一太祖高皇帝賜龍虎山二十代天師贊
  hash: sha256:9a3876dfe2adf2e4f42f0776a89c1db67bf582ad5b859eb7c8f47d945c9a1af3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_001-001a, image: hfl/1065/1065-016.png}
body:
  text: 第一代張道陵驅風疾霆機斡萬靈亶惟神智使濁而清道常無隱滿腹仙經鹿奔虎乘倏然上升第二代張𢖍步武飛虛至妙而樞握符而決神駕羊車周旋玉京萬里須臾坎離是會深淵躍魚第三代張魯載承載闡松底爐煙夭桃洞蕊實實三千白鶴趐空巖下鹿眠九霄環珮火棗年年第四代張盛繼符繼經上徹天庭永張斯教轉斗移星朝遊北海蒼松暮迎一祖師志鹿車是乘第五代張昭成袖劍而趨光射斗墟萬靈咸聽神步天衢斬妖縛邪與師無殊禦災捍患氣吐而舒第六代張椒鉛汞成砂煙結紫霞洞裏乾坤春意桃花不善人師不己而誇壺中日月更何以加第七代張回撫鹿蒼松羽扇登峯道合無為繼師而封不善而善密有神功知常守默樂道從容第八代張迥如不尚俗愛居茅屋白鶴一雙猶騎鹿月下星奔使黃而緑道氣常存歲歲辟穀第九代張符醉眠松底白雲籠衣似酩酊醒役使幽微至神有設鶴趐劍飛群妖斂迹巨怪悉夷第十代張子祥洞花才綻春松翠微高卧白雲仙茅為衣呼泉叱吒役劍神飛無上至真可以為竒第十一代張通玄演黃梁幻運鍾離機驅雲以從致雷電飛萬壑松聲丹光夜宜鶴氅飄然煙霞是冝第十二代張恆道德齊名鞭雷策霆按劍瞑目妖氣不生神逰八極上至天京宜哉宿緣物外常明第十三代張光九轉靈鉛砂汞當先茅飛去處妖魅倒懸神樞怒目下察黃泉仰觀三界浩氣如煙第十四代張慈正朝降崇巔酤入市廛過飲弗醉暮歸紫煙山雲松掃洞鎖千年和光同塵玄之又玄第十五代張高漆園善紀槐國昭然同此幻化千古尚傳師能善己乃達於仙虛靈不昧道氣常全第十六代張應韶繼傳十六人皆辟穀日食黃精貌態異俗歲月以來亦復如復牛背西風蒼山一曲第十七代張頥至危而全難去而天乃知爾仙乃知爾賢流派十七道氣陵煙孰謂其顛孰謂有緣第十八代張士元飛符有驗始祖有傳至於斯世名播八埏丹光上升斗氣愈鮮精神徘徊常在三天第十九代張修嵐光蔽山丹氣雜然飛符檄鬼無敢不前孰謂爾靈孰謂爾玄挂冠解衣樂道便便第二十代張諶冠山衣雲道氣常淳芬子有機鐺內猶渾盤中數著黑白星奔無上至妙丹田厚坤皇明恩命世録卷之一
