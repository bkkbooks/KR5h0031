front:
  text: 皇明恩命世録卷之七
  hash: sha256:a38192228251f3e33a6e98e322dc15286b1bcb93d76aa43482d54675e5b4591b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_007-001a, image: hfl/1065/1065-114.png}
body:
  text: 四十七代大真人張玄慶成化十三年召見命中使梁芳傳㫖聘成國公朱儀之女爲配明年命親赴南京畢姻仍賜蟒衣玉帶加撥馬快舡送回山授大真人誥奉天承運皇帝制曰朕惟玄教聿興惟陰翊於化理宗風丕闡在精練在勤誠繼嗣續之有人宜褒顯之無吝爾張玄慶乃神明遥胃福地高門警敏可嘉靜虛是尚兹當襲爾祖陰特命爲正一嗣教保和養素繼祖守道大真人領道教事爾其益懋進修率修道範毋隳立守永祝國釐則惟爾能欽哉制誥成化十三年十二月二十一日之寳封母吳氏玄君誥奉天承運皇帝制曰朕惟至道無名而修其道者教斯尊嗣世有源而厚其有源者恩必及玄門愆慶孫紹祖封國恩榮須母因子貴爾吴氏乃正一嗣教保和養素繼祖守道大真人張玄慶之母柔慈夙秉和惠可稱訓子克成宜膺寵命慈特封爲志順淑靜玄君服此茂恩永光閨範欽哉制誥成化十三年十二月二十一日之寳二十年申禁僞造符敕皇帝勅諭軍民諸色人等朕惟廣信府貴溪縣龍虎山乃張真人世居掌教之所自其祖流傳符籙以授于人洪武年間曾有令禁約不許僞造惑民取財永樂年間有令買魚於本山河内放養長生不許諸人網釣邇來豪勢刁潑之徒徃徃僞造符籙偷盜魚鮮違朝廷禁令今嗣教真人張玄慶以爲言特降勅禁約今後一應軍民諸色人等敢有恃頑刁潑僞造偷盜者聽所在官司挐問如官司不能鈴束者一體治罪不饒故諭勅命成化二十年二月二十三日之寳二十一年特勅江西守臣重建大真人府第命降香大華盖山及鐵柱宫二十二年召見命醮于欽安殿弘治三年命建祈聖嗣醮于内庭明年皇太子誕生賜玉帶金冠蟒衣之屬九年欽遣太監李瑾李珍捧勅命建保民大醮于上清宫以撫臣并兩司掌印官陪祀十一年命建祈雪醮于朝天宫十二年須賜牙圖書二顆命進太上延禧籙十四年詔入朝上御欽安殿召見命坐賜宴十五年命陪祀長陵賜准致仕勅勅正一嗣教大真人張玄慶惟爾祖宗世領道教嗣有封秩以至于爾繼承不替盖亦有年近因爾朝賀至京奏稱有疾自乞退閒令男張彦頨替襲真人職事兹特乆所奏爾旣優閒宜深居習靜保養形神而彦頨亦要精通法業善守名秩以紹宗風以無忝扵前人斯不負朝廷寵遇之意爾其慎之慎之故勅廣運弘治十五年三月十九日之寳本年命齎香達天日葛仙華盖武當鶴鳴等山詔遣通州衛指揮領官兵護送還山十八年錫褒問書皇帝書致正一嗣教致仕大真人張玄慶朕惟玄風丕振三極建于春臺化雨均霑八荒躋于壽域派延仙譜慶衍皇圖業惟精于淨修功斯顯于賛翊惟爾丰標散逸氣質純誠傳祖宗百世之休揚天地萬年之譽方其分符受命也旣嘗盡職于委身及其解組還山也輒乃歸眞于遁跡一塵不染瑩三尺之氷壺萬慮咸消澄九霄之霽月超凡入聖伏虎降龍泉石養高琴罇興顧冲虛之妙道實利濟之真光矧兹繞膝斒斕嘉袍笏之有託滿前蒼木幸榮辱之無干佇想清容益懷遠况致言重復注意勤虔惟其亮之廣運弘治十八年二月二十二日之寳諭禁止僞造符勅皇帝勅諭正一嗣教致仕大真人張玄慶邇年以來各處符籙恣意妄傳近已命禮部行文一體禁約務要遵照洪武永樂年間事例悉從嗣教大真人門下請給爾惟鑒察朕意亦要拘禁家下人等謹守法㫖毋得僞造褻慢庶幾清規不紊妙道益崇故諭廣運弘治十八年三月二十二日之寳賜書軸銀幣勅勅正一嗣教致仕大真人張玄慶爾子大真人張彦頨來朝附至聖像靈符古劍等儀珍修之餘備諗誠悃知爾動止清嘉天和安養深慰朕懷兹具畫軸蒼銀幣帛用將遠恍爾其鑒納故勅廣運弘治十八年三月二十二日之寳命齎香燭勅勅正一嗣教致仕大真人張玄慶得䟽知爾欲徃武當山鶴鳴山葛仙山三處一遊顧兹天時和煦民物康阜乘興登覽不妨清暇兹特俞乆任從擇吉前去鶴鳴山途路修阻恐有䟦涉之勞欲徃任意如或不徃遣人齎香達誠亦可其所履尚冀勉加珍重早還仙旆以副朕望兹具香燭九分同緘馳附煩爲轉獻以表朕敬奉之誠故勅廣運弘治十八年三月二十二日之寶皇明恩命世録卷之七
