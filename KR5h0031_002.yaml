front:
  text: 皇眀恩命世録卷之二
  hash: sha256:c21cb2f3c6b8d07e2fe03569034c169f61400acf25283082ad58e65d3a59470a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_002-001a, image: hfl/1065/1065-024.png}
body:
  text: 四十二代天師大真人張正常招聘榜文吳王令旨江西等處行中書省蓋聞玄教無為默贊國家之治皇猷大啓丕崇道德之風乃眷至人素居福地既已歸於版籍必特表其儀形信州龍虎山正一教主天師大真人衍華胄于留侯紹真傳于老子身受祖師之託役彼百靈心與造物者逰超乎萬類凡有知覺罔不皈依但因兵革以來遂使公庭多故近聞冠珮遠寄江湖爰伸物色之勤庶冀居之速省府除已差官齎香前詣龍虎山宗壇敬奉真仙祝延聖壽外合行出榜曉諭仰總兵官及有司官員訪求天師多有招聘禮請入山依前住持道教但係龍虎山宫觀殿宇及供器什物諸人毋得作踐損壞褻瀆神明舊管山園田地房屋悉聽為主諸色軍民人等不許奪占違者治罪須至榜者龍鳳六年月日給本年四月回勉澄心定性以凝道功書吳王書致玄壇教主四十二代天師張真人五月六日俞真人來捧至箋文並有奇香素羅之獻誠意甚厚足見名山文物之盛吾聞漢祖天師道德在躬動得鬼神之助一噓一吸間天道為之晦冥雷霆諸神莫不受命以此輔國濟民除其妖孽援其水旱故靈名歷四十餘代而愈著也今吾師既臨乃祖之位序當繼乃祖之成烈有非他術之可同者願師澄心定性以凝道功使前靈之迹蓋顯則龍虎之山益崇而人益仰望也夏月道體平安否尚冀千萬加愛乙巳年上召見命坐賜宴賜褒天師旨吳王令旨夫天地之間品類不等生而無窮惟人最靈然而神聖之生賢人所降非常也皆得天地至靈之氣故然亦世間聖賢之常也有天假其能因天授人之歟或為帝王或為將相如釋道焉或為佛或為仙雖或天地正氣所生是由天假其能故成數等豫聞漢祖天師生而異常眉崢鬚橫兩目星馳電轉神威萬倍始西蜀詣龍虎役使鬼神肇造玄壇非獨自己為能止了身心實與國民有補焉至是捍大患禦大災明乎三界鬼神相繼留傳歷代代代無有不崇者何也蓋由天師靈而有益者是也豫自草萊因天下變為衆所尊不敢不竭心之誠以安民庶每聞天師今為我見快哉一覩覿面天師瞳樞電轉法貌昂然雖不職事於朝廷同我一時豈不干載一遇也可不奇哉然而釋道之玄深有意焉愚者未知知者勿迷敬常則吉非常則禍福增滅矣悅天師法貌其容同祖故有賜上再召入對乃賜宴及金幣還山丙午年命普施符水旨吳王令旨豫聞漢天師妙用玄機通天透地濟物利人為國家捍患禦災歷代聖賢所禱無不感應今天師息於朝天宫士民濟濟求符師當斟酌放符驗其有無患難與可與之人而無患難之家與訖一符他日患堆暴生愚民無所知將謂符法所驗或有相輕互相轉説為師之慮莫若從有患者給無患者郤此説未知當否宜與諸法師會議普施符水深潛妙用以秀山靈可也上聞病疫者飲井中符水獲差聖意嘉之命作亭于井上號曰太乙泉命進太上延禧籙準辭還山特詔中書給驛劵畀之以便朝覲吳元年丁未二月初八日命選精道法師赴闕書吳王書致玄壇教主龍虎山張天師豫近自正月為國家之事心所欠者欲奏聞上帝奈無人捧詞至于天庭故差人詣天師門下望天師以彼祖宗之靈必當誠心差精通道妙之師捧詞達天以申祈禱之情即師之虔意也書至幸望令能者之師前來再不多敘本年五月洪武元年上登大寶位錫宴于便殿上顧諭曰兹授卿以大真人稱號誥命將議給食祿既而面可辭俸之奏俾專出符籙如故事恩免通户及大上清宫各色徭役永為定例命給銀印視正二品設贊教掌書佐理等官授四十二代天師大真人誥奉天承運皇帝制曰朕惟玄教真風闡五千餘言之典祖庭積慶衍四十二代之傳地靈育龍虎之英仙骨竦鶴鸞之表掌兹正一品佑我大明天師張正常簡素性成端凝天賦琳書寶札探祕妙于珠黍之中緑輿瓊輪超冥漠於璇霄之上仗劍則鬼神聽令登壇則雷雨應時卓爾天人之師允矣神明之胄然道德不拘於名爵性情貴守於中和夫何近代以來特授官資之顯揆以至理未足為榮用制真人之美稱俾冠道流于當世聲揚寰宇法主宗壇豫欲通誠于九天汝則以精神而運用豫欲敷治于四海汝則以清靜而輔毗茂膺籠元永綏福履可授正一教主嗣漢四十二代天師護國闡祖通誠崇道弘德大真人領道教事宜令張正常準此制誥洪武元年三月初一日之寶準辭還山上御謹身殿從容謂曰卿乃祖天師有功于國所以家世與孔子並傳以迄于今卿宜體之以清靜無為輔豫至治則豫汝嘉諭畢出白金十五鎰賜之俾葺府弟二年二月特召入朝上御奉天殿賜見預命設安待之是月垂顧問者四二月十三日上將通誠于天帝致齋三日御衮冕親署御名于重勑太常設樂手授俾祝而焚之禮成賜金幣宴于文樓群弟子饗於别館賞賚有差三年六月上録功貤寵特勑吏部改贈正常父三十九代天師太玄輔化體仁應道大真人嗣成為正一教主大玄弘化明誠崇道大真人改封正常母明慧慈順仙姑胡氏為恭順慈惠淑靜玄君上一日召見問以鬼神清狀命更給掌天下道教銀印五年加授永掌道教事誥奉天承運皇帝制曰朕惟道家者流本於清靜無為其來尚矣龍虎山張氏自漢以下宗派相繼其四十二代孫正常存心沖淡葆德純和遠紹宗傳以守正一朕用嘉之是宜錫以真人之號爾其益振玄風永掌其教焉可授正一嗣教護國闡祖通誠崇道弘德大真人掌天下道教事宜令張正常準此制誥洪武五年十二月日之寶九年上遣使召忽先期入見上喜曰卿來何與朕意相符明年秋朕將遣使祠海嶽諸神卿當妙柬清修之士與其偕來賜宴及金紋法衣玉圭珮法器之屬十年命率弟子至京上召見錫宴午門之城樓上舉爵謂曰卿宜罄此一觴勑內侍官出御製歷代天師贊示曰他日當書以賜卿明日詔偕太師韓國公李善長代祠嵩山分遣大臣與弟子代祠群望仍賜衣二襲及褚幣有差既還復命錫宴賞如初遣祠嵩山勑敕正一嗣教大真人張正常朕聞天生民而立君君為民而立命所以謹百神之祀乃國之先務也朕與卿等當群雄角遂之時戰勝攻取非上天后土之眷命嶽鎮海瀆之效靈安能如是今者新秋在邇嶽鎮海瀆之祀禮當報謝古者君狩方隅詣祠而祭朕為新造邦基民生方始未獲親往特命卿等代朕以行奉犧牲祝帛于神所故兹勑諭汝往欽哉勑命洪武十年六月日之寶十一年上聞禮部尚書張籌代奏訃音天衷嗟悼良久且曰朕欲命其遍祠五嶽今方一至嵩山何期大數止于此遂親製祭文一通詔遣前浙江行省參知政事安慶詣山諭祭維洪武十一年歲在戊午正月甲戌朔越二十日癸巳皇帝遣浙江參政安慶致祭于大真人張正常之靈曰繼出世法統仙度人禦災捍患機斡萬靈飛符仗劍轉斗移星雷神聽令妖魅潛形道光斯著貌正精英何乘鸞之去急控法印于上清今遣人祀以牲醴爾其有知尚饗皇明恩命世録卷之二
