front:
  text: 皇眀恩命世録卷之二
  hash: sha256:c21cb2f3c6b8d07e2fe03569034c169f61400acf25283082ad58e65d3a59470a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0031_HFL_002-001a, image: hfl/1065/1065-024.png}
body:
  text: 四十二代天師大真人張正常招聘榜文吴王令㫖江西等處行中書省盖聞玄教無爲默賛國家之治皇猷大啓丕崇道德之風乃眷至人素居福地旣已歸於版籍必特表其儀形信州龍虎山正一教主天師大真人衍華胄扵留侯紹真傳扵老子身受祖師之託役彼百靈心與造物者逰超乎萬類凡有知覺罔不皈依但因兵革以來遂使公庭多故近聞冠珮遠寄江湖爰伸物色之勤庶冀居之速省府除已差官齎香前詣龍虎山宗壇敬奉真仙祝延聖壽外合行出榜曉諭仰總兵官及有司官員訪求天師多有招聘禮請入山依前住持道教但係龍虎山宫觀殿宇及供器什物諸人毋得作踐損壞褻瀆神明舊管山園田地房屋悉聽爲主諸色軍民人等不許奪占違者治罪須至榜者龍鳳六年月日給本年四月回勉澄心定性以凝道功書吴王書致玄壇教主四十二代天師張真人五月六日俞真人來捧至箋文並有奇香素羅之獻誠意甚厚足見名山文物之盛吾聞漢祖天師道德在躬動得鬼神之助一噓一吸間天道爲之晦冥雷霆諸神莫不受命以此輔國濟民除其妖孽援其水旱故靈名歷四十餘代而愈著也今吾師旣臨乃祖之位序當繼乃祖之成烈有非他術之可同者願師澄心定性以凝道功使前靈之跡盖顯則龍虎之山益崇而人益仰望也夏月道體平安否尚冀千萬加愛乙巳年上召見命坐賜宴賜褒天師㫖吴王令㫖夫天地之間品類不等生而無窮惟人最靈然而神聖之生賢人所降非常也皆得天地至靈之氣故然亦世間聖賢之常也有天假其能因天授人之歟或爲帝王或爲將相如釋道焉或爲佛或爲仙雖或天地正氣所生是由天假其能故成數等予聞漢祖天師生而異常眉崢鬚横兩目星馳電轉神威萬倍始西蜀詣龍虎役使鬼神肇造玄壇非獨自己爲能止了身心實與國民有補焉至是捍大患禦大災明乎三界鬼神相繼留傳歷代代代無有不崇者何也盖由天師靈而有益者是也予自草萊因天下變爲衆所尊不敢不竭心之誠以安民庶每聞天師今爲我見快哉一覩覿面天師瞳樞電轉法貌昂然雖不職事於朝廷同我一時豈不干載一遇也可不奇哉然而釋道之玄深有意焉愚者未知知者勿迷敬常則吉非常則禍福增滅矣悅天師法貌其容同祖故有賜上再召入對乃賜宴及金幣還山丙午年命普施符水㫖吴王令㫖予聞漢天師妙用玄機通天透地濟物利人爲國家捍患禦災歷代聖賢所禱無不感應今天師息於朝天宫士民濟濟求符師當斟酌放符驗其有無患難與可與之人而無患難之家與訖一符他日患堆暴生愚民無所知將謂符法所驗或有相輕互相轉說爲師之慮莫若從有患者給無患者郤此說未知當否宜與諸法師會議普施符水深潛妙用以秀山靈可也上聞病疫者飲井中符水獲差聖意嘉之命作亭于井上號曰太乙泉命進太上延禧籙准辭還山特詔中書給驛劵畀之以便朝覲吴元年丁未二月初八日命選精道法師赴闕書吴王書致玄壇教主龍虎山張天師予近自正月爲國家之事心所欠者欲奏聞上帝奈無人捧詞至于天庭故差人詣天師門下望天師以彼祖宗之靈必當誠心差精通道妙之師捧詞達天以申祈禱之情即師之虔意也書至幸望令能者之師前來再不多叙本年五月洪武元年上登大寳位錫宴于便殿上顧諭曰兹授卿以大真人稱號誥命將議給食禄旣而面可辭俸之奏俾專出符籙如故事恩免通户及大上清宫各色徭役永爲定例命給銀印視正二品設賛教掌書佐理等官授四十二代天師大真人誥奉天承運皇帝制曰朕惟玄教真風闡五千餘言之典祖庭積慶衍四十二代之傳地靈毓龍虎之英仙骨竦鶴鸞之表掌兹正一品佑我大明天師張正常簡素性成端凝天賦琳書寳札探秘妙扵珠黍之中緑輿瓊輪超㝠漠於璇霄之上仗劍則鬼神聽令登壇則雷雨應時卓爾天人之師允矣神明之胄然道德不拘於名爵性情貴守於中和夫何近代以來特授官資之顯揆以至理未足爲榮用制真人之美稱俾冠道流扵當世聲揚寰宇法主宗壇予欲通誠扵九天汝則以精神而運用予欲敷治扵四海汝則以清靜而輔毗茂膺籠元永綏福履可授正一教主嗣漢四十二代天師護國闡祖通誠崇道弘德大真人領道教事宜令張正常准此制誥洪武元年三月初一日之寳准辭還山上御謹身殿從容謂曰卿乃祖天師有功扵國所以家世與孔子並傳以迄于今卿宜體之以清靜無爲輔予至治則予汝嘉諭畢出白金十五鎰賜之俾葺府弟二年二月特召入朝上御奉天殿賜見預命設安待之是月垂顧問者四二月十三日上將通誠扵天帝致齋三日御衮冕親署御名于重勑太常設樂手授俾祝而焚之禮成賜金幣宴于文樓群弟子饗於别館賞賚有差三年六月上録功貤寵特勑吏部改贈正常父三十九代天師太玄輔化體仁應道大真人嗣成爲正一教主大玄弘化明誠崇道大真人改封正常母明慧慈順仙姑胡氏爲恭順慈惠淑靜玄君上一日召見問以鬼神清狀命更給掌天下道教銀印五年加授永掌道教事誥奉天承運皇帝制曰朕惟道家者流本於清靜無爲其來尚矣龍虎山張氏自漢以下宗派相繼其四十二代孫正常存心冲澹葆德純和遠紹宗傳以守正一朕用嘉之是宜錫以真人之號爾其益振玄風永掌其教焉可授正一嗣教護國闡祖通誠崇道弘德大真人掌天下道教事宜令張正常准此制誥洪武五年十二月日之寳九年上遣使召忽先期入見上喜曰卿來何與朕意相符明年秋朕將遣使祠海嶽諸神卿當妙柬清修之士與其偕來賜宴及金紋法衣玉圭珮法器之屬十年命率弟子至京上召見錫宴午門之城樓上舉爵謂曰卿宜罄此一觴勑内侍官出御製歷代天師賛示曰他日當書以賜卿明日詔偕太師韓國公李善長代祠嵩山分遣大臣與弟子代祠群望仍賜衣二襲及褚幣有差旣還復命錫宴賞如初遣祠嵩山勑勅正一嗣教大真人張正常朕聞天生民而立君君爲民而立命所以謹百神之祀乃國之先務也朕與卿等當群雄角遂之時戰勝攻取非上天后土之眷命嶽鎮海瀆之效靈安能如是今者新秋在邇嶽鎮海瀆之祀禮當報謝古者君狩方隅詣祠而祭朕爲新造邦基民生方始未獲親徃特命卿等代朕以行奉犧牲祝帛扵神所故兹勑諭汝徃欽哉勑命洪武十年六月日之寳十一年上聞禮部尚書張籌代奏訃音天衷嗟悼良久且曰朕欲命其徧祠五嶽今方一至嵩山何期大數止扵此遂親製祭文一通詔遣前浙江行省叅知政事安慶詣山諭祭維洪武十一年歲在戊午正月甲戌朔越二十日癸巳皇帝遣浙江叅政安慶致祭于大眞人張正常之靈曰繼出世法統仙度人禦災捍患機斡萬靈飛符仗劍轉斗移星雷神聽令妖鬽潜形道光斯著貌正精英何乘鸞之去急控法印扵上清今遣人祀以牲醴爾其有知尚饗皇明恩命世録卷之二
